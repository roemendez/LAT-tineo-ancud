<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="LT Tineo-Ancud"/>
<title>LT Tineo–Ancud | Transelec</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:#f8fafc;font-family:'Segoe UI',system-ui,sans-serif;max-width:480px;margin:0 auto;min-height:100vh}

/* ═══ RESPONSIVE DESKTOP ═══ */
@media(min-width:768px){
  body{max-width:100%;margin:0}

  /* Header desktop */
  #header{padding:0;position:sticky;top:0;z-index:50;display:flex;flex-direction:column}
  .desktop-topbar{display:flex!important;align-items:center;justify-content:space-between;
    background:linear-gradient(90deg,#0c1220,#1e293b);
    padding:12px 28px;border-bottom:1px solid #1e293b}
  .desktop-brand{display:flex;align-items:center;gap:16px}
  .desktop-nav{display:flex;gap:4px}
  .desktop-nav .tab{font-size:12px;padding:8px 16px;border-radius:8px;flex:none;width:auto}
  .tabs{display:none!important}        /* ocultar tabs móvil */
  .filters{padding:8px 28px;background:#0f172a;border-bottom:1px solid #1e293b}

  /* Layout principal: sidebar + contenido */
  #app-layout{display:flex;min-height:calc(100vh - 60px)}
  #sidebar{width:220px;flex-shrink:0;background:#0c1220;border-right:1px solid #1e293b;
    padding:20px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
  #sidebar-nav{display:flex;flex-direction:column;gap:4px;padding:0 12px}
  .sidebar-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;
    border:none;background:transparent;color:#64748b;font-size:13px;font-weight:600;
    cursor:pointer;transition:all .2s;text-align:left;width:100%}
  .sidebar-btn:hover{background:#1e293b;color:#94a3b8}
  .sidebar-btn.active{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b33}
  .sidebar-btn .sb-icon{font-size:16px;width:22px;text-align:center}
  .sidebar-divider{height:1px;background:#1e293b;margin:10px 12px}
  .sidebar-pct{background:#1e293b;border-radius:10px;margin:12px;padding:14px;text-align:center}

  /* Contenido principal */
  #main-content{flex:1;padding:24px 28px;overflow-y:auto;max-height:calc(100vh - 60px)}

  /* Cards y grillas desktop */
  .card{border-radius:14px;padding:20px}
  .kpi-grid3{grid-template-columns:repeat(3,1fr);gap:12px}
  .kpi-grid2{grid-template-columns:repeat(4,1fr);gap:12px}
  .kpi{padding:16px 18px;border-radius:12px}
  .kpi-val{font-size:28px}
  .kpi-label{font-size:11px}
  .sector-grid{grid-template-columns:1fr 1fr;gap:14px}

  /* Mapa: más columnas */
  .mapa-grid{gap:6px}
  .torre-btn{width:60px;height:60px;border-radius:10px}

  /* Detalle torre: 2 columnas en desktop */
  .det-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .det-col-full{grid-column:1/-1}

  /* Lista: tabla más ancha */
  .torre-item{border-radius:12px;padding:16px 20px}
  .torre-name{font-size:17px}

  /* Modal centrado en desktop */
  #modal-overlay{align-items:center}
  #modal-box{border-radius:16px;max-width:480px;max-height:80vh}

  /* Sync dot reposición */
  #sync-dot{top:14px;right:20px}
  #offline-banner{font-size:13px;padding:8px}

  /* Toast más visible */
  #toast{bottom:30px;font-size:14px;padding:12px 24px}
}

@media(min-width:1200px){
  #sidebar{width:240px}
  #main-content{padding:28px 36px}
  .kpi-grid3{grid-template-columns:repeat(6,1fr)}
  .kpi-grid2{grid-template-columns:repeat(4,1fr)}
}
input[type=range]{-webkit-appearance:none;height:4px;background:#1e293b;border-radius:99px;outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#f59e0b;cursor:pointer;border:2px solid #0f172a}
input[type=text],input[type=number],select,textarea{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#f8fafc;font-size:13px;outline:none;font-family:inherit}
textarea{resize:vertical;min-height:70px;width:100%}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}
/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:200;align-items:flex-end;justify-content:center}
#modal-overlay.show{display:flex}
#modal-box{background:#1e293b;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 20px 40px;max-height:85vh;overflow-y:auto}
#modal-title{font-size:16px;font-weight:800;color:#f59e0b;margin-bottom:16px}
/* Header */
#header{background:linear-gradient(90deg,#0f172a,#1e293b);border-bottom:1px solid #1e293b;padding:10px 14px 8px;position:sticky;top:0;z-index:50}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.htitle{font-size:9px;color:#f59e0b;letter-spacing:2px;font-weight:700}
.hname{font-size:14px;font-weight:900;line-height:1.1}
.hpct{font-size:20px;font-weight:900;color:#f59e0b}
.hpctlabel{font-size:9px;color:#475569;text-align:right}
.tabs{display:flex;gap:3px}
.tab{flex:1;padding:5px 1px;border-radius:7px;border:none;font-size:8px;font-weight:700;transition:all .2s}
.tab.active{background:#f59e0b;color:#0f172a}
.tab:not(.active){background:#1e293b;color:#64748b}
.filters{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.filt{padding:3px 10px;border-radius:20px;border:none;font-size:10px;font-weight:600}
.filt.active{background:#f59e0b;color:#0f172a}
.filt:not(.active){background:#0f172a;color:#64748b}
/* Content */
#content{padding:14px 12px 60px}
.card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px}
.bar-wrap{background:#0f172a;border-radius:99px;overflow:hidden;width:100%}
.bar-fill{height:100%;border-radius:99px;transition:width .4s}
.badge{border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;font-family:monospace;color:#fff}
/* KPI grids */
.kpi-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px}
.kpi-grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.kpi{background:#1e293b;border-radius:10px;padding:10px 12px}
.kpi-icon{font-size:14px;margin-bottom:2px}
.kpi-val{font-size:22px;font-weight:900;line-height:1}
.kpi-label{font-size:9px;color:#64748b;margin-top:2px;letter-spacing:.4px}
.kpi-sub{font-size:8px;color:#334155;margin-top:1px}
.sector-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
/* Torre list item */
.torre-item{background:#1e293b;border-radius:10px;padding:12px 14px;margin-bottom:7px;cursor:pointer;border-left:3px solid #334155}
.torre-name{font-weight:800;color:#f59e0b;font-size:15px}
.torre-meta{display:flex;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.torre-meta span{font-size:10px;color:#475569}
/* Mapa */
.mapa-sector-label{font-size:10px;color:#475569;letter-spacing:1px;margin-bottom:8px}
.mapa-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.torre-btn{width:50px;height:50px;border-radius:8px;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.legend{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:10px;height:10px;border-radius:3px}
.leg-label{font-size:10px;color:#64748b}
/* Detalle */
.back-btn{background:none;border:none;color:#f59e0b;font-size:13px;margin-bottom:14px;padding:0}
.det-header{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid rgba(245,158,11,.27)}
/* Impedimento banner */
.imp-banner{background:#7f1d1d22;border:1px solid #f43f5e55;border-radius:10px;padding:12px 14px;margin-bottom:12px}
/* Fnd selector */
.fnd-selector{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.fnd-opt{padding:12px 5px;border-radius:10px;border:2px solid #1e293b;background:#0f172a;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s}
.fnd-opt-icon{font-size:18px}
.fnd-opt-label{font-size:10px;font-weight:700;white-space:pre-line;text-align:center;line-height:1.2}
.fnd-opt-sub{font-size:8px;color:#475569}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:10px;color:#64748b;letter-spacing:1px}
/* Actividad */
.act-row{margin-bottom:7px;background:#0f172a;border-radius:9px;padding:9px 11px}
.act-top{display:flex;align-items:center;gap:7px}
.act-check{width:20px;height:20px;border-radius:5px;border:2px solid #334155;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.act-label{flex:1;font-size:12px;color:#94a3b8}
.act-label.done{color:#f8fafc}
.act-label.na{color:#334155;text-decoration:line-through}
.act-na-btn{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;flex-shrink:0}
/* Partida acordeón */
.partida-block{background:#0f172a;border-radius:10px;margin-bottom:8px;overflow:hidden}
.partida-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;user-select:none}
.partida-title{font-size:12px;font-weight:700;color:#cbd5e1}
.partida-chevron{font-size:11px;color:#475569;transition:transform .2s;flex-shrink:0}
.partida-chevron.open{transform:rotate(180deg)}
.partida-body{padding:0 12px 10px;display:none}
.partida-body.open{display:block}
.pata-row{margin-bottom:10px;border-bottom:1px solid #1e293b;padding-bottom:10px}
.pata-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.pata-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.pata-name{font-size:11px;font-weight:700;color:#64748b;letter-spacing:.5px}
/* Protocolo */
.proto-row{margin-top:7px;background:#0f172a22;border-radius:7px;padding:7px 9px;border:1px solid #1e293b}
.proto-label{font-size:9px;color:#475569;letter-spacing:.5px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.proto-states{display:flex;gap:3px;flex-wrap:wrap}
.proto-btn{flex:1;min-width:0;padding:5px 2px;border-radius:5px;border:1px solid #1e293b;font-size:9px;font-weight:700;background:#0f172a;color:#475569;transition:all .15s;text-align:center}
.proto-btn.active-pendiente{background:#1e293b44;border-color:#64748b;color:#94a3b8}
.proto-btn.active-emitido{background:#1d4ed822;border-color:#3b82f6;color:#3b82f6}
.proto-btn.active-observado{background:#b4530922;border-color:#f59e0b;color:#f59e0b}
.proto-btn.active-ok{background:#15803d22;border-color:#10b981;color:#10b981}
.proto-btn.active-na{background:#33415544;border-color:#475569;color:#475569}
/* Protocolos view */
.proto-tab{padding:4px 12px;border-radius:20px;border:none;font-size:10px;font-weight:700}
.proto-tab.active{background:#f59e0b;color:#0f172a}
.proto-tab:not(.active){background:#1e293b;color:#64748b}
.proto-tower-card{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:7px;cursor:pointer}
.proto-chip{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700}
.partida-summary{background:#1e293b;border-radius:10px;padding:11px 12px;margin-bottom:7px}
/* Config */
.config-section{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px}
.config-title{font-size:11px;color:#64748b;letter-spacing:1px;margin-bottom:12px;font-weight:700}
.config-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.config-label{font-size:12px;color:#94a3b8;flex:1}
.config-input{width:60px;text-align:center;padding:5px 8px}
.config-total{font-size:11px;padding:3px 8px;border-radius:5px;font-weight:700}
/* Botones de porcentaje + input manual */
.pct-btns{display:flex;gap:3px;margin:5px 0 2px;align-items:center}
.pct-btn{flex:1;padding:6px 0;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#64748b;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.pct-btn.active{border-color:var(--fnd-color,#f59e0b);background:var(--fnd-bg,#f59e0b22);color:var(--fnd-color,#f59e0b)}
.pct-btn:active{transform:scale(.93)}
.pct-manual{display:flex;align-items:center;gap:4px;margin:2px 0 4px}
.pct-manual input{width:52px;text-align:center;padding:5px 6px;font-size:12px;font-weight:700;border-radius:6px;background:#0f172a;color:#f8fafc}
.pct-manual span{font-size:11px;color:#64748b}
.pct-manual button{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
/* Fechas inicio / término */
.fechas-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.fecha-item{display:flex;flex-direction:column;gap:2px;flex:1;min-width:120px}
.fecha-item-label{font-size:9px;color:#475569;letter-spacing:.5px;font-weight:600}
.fecha-set{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:none;width:100%;justify-content:space-between}
.fecha-inicio-set{background:#1d4ed822;color:#60a5fa;border:1px solid #3b82f644}
.fecha-fin-set{background:#15803d22;color:#10b981;border:1px solid #10b98144}
.fecha-empty{background:#0f172a;color:#334155;border:1px solid #1e293b}
.fecha-empty:hover{border-color:#f59e0b44;color:#64748b}
input[type=date]{background:#1e293b;border:1px solid #f59e0b55;border-radius:8px;padding:8px 10px;color:#f8fafc;font-size:14px;outline:none;font-family:inherit;width:100%;margin-bottom:4px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.7;cursor:pointer}

/* Sync */
#sync-dot{position:fixed;top:8px;right:8px;font-size:10px;color:#64748b;z-index:100;font-weight:700;background:#0f172a99;padding:2px 5px;border-radius:20px}

/* Tramos / contratistas */
.tramo-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700}
.tramo-globaltec{background:#1d4ed822;color:#60a5fa;border:1px solid #3b82f644}
.tramo-cstc{background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44}
.tramo-pendiente{background:#1e293b;color:#334155;border:1px solid #1e293b}
.tramo-cruce{background:#0f766e22;color:#14b8a6;border:1px solid #0f766e44}

/* Hitos */
.hito-card{background:#1e293b;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid #334155}
.hito-card.cumplido{border-left-color:#10b981}
.hito-card.en-riesgo{border-left-color:#f59e0b}
.hito-card.atrasado{border-left-color:#f43f5e}
.hito-card.pendiente{border-left-color:#475569}
.hito-num{font-size:10px;font-weight:700;color:#475569;margin-bottom:2px}
.hito-desc{font-size:12px;font-weight:700;color:#cbd5e1;margin-bottom:6px}
.hito-dates{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.hito-date{font-size:10px;color:#64748b}
.hito-date b{color:#94a3b8}
.hito-estado{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700}
.hito-alert{background:#f59e0b22;border:1px solid #f59e0b44;border-radius:8px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:11px;color:#f59e0b;font-weight:600}
.hitos-tramo-header{font-size:12px;font-weight:700;color:#f8fafc;margin:16px 0 8px;padding:8px 12px;background:#1e293b;border-radius:8px;border-left:3px solid #f59e0b}

/* Fotos */
.fotos-thumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.foto-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;position:relative;background:#0f172a}
.foto-thumb img{width:100%;height:100%;object-fit:cover}
.foto-thumb .foto-del{position:absolute;top:3px;right:3px;background:#00000099;border:none;color:#f43f5e;border-radius:4px;padding:2px 5px;font-size:10px;cursor:pointer}
.foto-count-badge{display:inline-flex;align-items:center;gap:4px;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:3px 8px;font-size:10px;color:#64748b;cursor:pointer}
.foto-count-badge.has-fotos{border-color:#f59e0b44;color:#f59e0b}
#offline-banner{background:#7f1d1d;color:#fca5a5;text-align:center;padding:5px;font-size:11px;font-weight:600;display:none}
/* Action buttons */
.action-btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:700;margin-bottom:8px}
.btn-primary{background:#f59e0b;color:#0f172a}
.btn-secondary{background:#1e293b;color:#94a3b8;border:1px solid #334155}
.btn-danger{background:#7f1d1d22;color:#f43f5e;border:1px solid #f43f5e44}
.btn-success{background:#15803d22;color:#10b981;border:1px solid #10b98144}
/* Form fields */
.form-group{margin-bottom:12px}
.form-label{font-size:11px;color:#64748b;margin-bottom:5px;display:block}
.form-input{width:100%}


/* ═══════════════════ TEMA CLARO EJECUTIVO v3 ═══════════════════ */
:root{
  --bg:#f5f7fb; --panel:#ffffff; --panel2:#f8fafc; --text:#0f172a; --muted:#64748b;
  --line:#dbe3ef; --blue:#1d4ed8; --cyan:#0891b2; --orange:#f59e0b; --red:#e11d48;
}
body{background:var(--bg)!important;color:var(--text)!important;max-width:100%!important}
#header,.desktop-topbar{background:#ffffff!important;border-bottom:1px solid var(--line)!important;box-shadow:0 1px 3px rgba(15,23,42,.06)!important}
#mobile-header{background:#ffffff!important}.hname,.desktop-brand div, .hrow{color:var(--text)!important}.htitle{color:#f59e0b!important}.hpct,.hpctlabel{color:#f59e0b!important}
#app-layout,#main-content,#content{background:var(--bg)!important;color:var(--text)!important}
#sidebar{background:#ffffff!important;border-right:1px solid var(--line)!important;box-shadow:1px 0 3px rgba(15,23,42,.04)!important}
.sidebar-pct,.card,.config-section,.torre-item,.proto-tower-card,.partida-summary,.hito-card,.det-header{background:#ffffff!important;color:var(--text)!important;border-color:var(--line)!important;box-shadow:0 1px 3px rgba(15,23,42,.06)!important}
.kpi{background:#ffffff!important;color:var(--text)!important;border-color:var(--line)!important;box-shadow:0 1px 2px rgba(15,23,42,.04)!important}
.sidebar-btn{color:#475569!important}.sidebar-btn:hover{background:#f1f5f9!important;color:#0f172a!important}.sidebar-btn.active{background:#fff7ed!important;color:#ea580c!important;border-color:#fed7aa!important}
.tab:not(.active),.filt:not(.active),.proto-tab:not(.active){background:#eef2f7!important;color:#475569!important}.tab.active,.filt.active,.proto-tab.active{background:#f59e0b!important;color:#111827!important}
.bar-wrap{background:#e8edf5!important}.bar-fill{box-shadow:none!important}
input[type=text],input[type=number],select,textarea,input[type=date]{background:#ffffff!important;color:#0f172a!important;border-color:#cbd5e1!important}
.badge{color:#fff!important}.sec-title,.kpi-label,.torre-meta span,.form-label,.config-title,.config-label{color:#64748b!important}
.torre-name,#modal-title,.back-btn{color:#f59e0b!important}
#modal-box{background:#ffffff!important;color:#0f172a!important}

  // ── MONTAJE: pesos internos del bloque montaje (suman 1.0) ──
  // Bloque montaje = 40% del total  →  cada uno × 0.40 = % real
  mnt_recepcion_material: 0.10, // 10% interno → 4.0% real

  mnt_montaje_estructura: 0.50, // 50% interno → 20.0% real
  mnt_giro_aplome_torque: 0.10, // 10% interno → 4.0% real
  // ── PESOS GLOBALES DE BLOQUE ──
  // gen_suma (0.20) + global_fnd (0.40) + global_mnt (0.40) = 1.00 ✓
  global_fnd: 0.40,
  global_mnt: 0.40,
};

let PESOS = {};

function loadPesos() {
  try {
    const s = localStorage.getItem('pesos_v2'); // v2 = new balanced weights
    PESOS = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_PESOS));
    // Limpiar pesos anteriores
    try { localStorage.removeItem('pesos_v1'); } catch {}
  } catch { PESOS = JSON.parse(JSON.stringify(DEFAULT_PESOS)); }
}

function savePesos() {
  localStorage.setItem('pesos_v2', JSON.stringify(PESOS));
  if (dbReady && db) db.ref('config/pesos').set(PESOS);
}

let TORRES = [];
let TORRES_MAP = {};
let torresManuales = [];

// IDs que se muestran en mapa/lista pero NO cuentan en los totales/porcentajes
// del dashboard "Avance General del Proyecto" (no son torres de línea ni especiales).
const TORRES_FUERA_DE_TOTALES = ['SE_TINEO'];
function getTorresParaTotales() {
  return TORRES.filter(t => !TORRES_FUERA_DE_TOTALES.includes(String(t.id)));
}

function buildTorresMap() {
  TORRES = [...TORRES_BASE, ...torresManuales].sort((a,b) => {
    // Sort: numeric ids first, then alphanumeric (1A, 1B...), then special (SE_TINEO)
    const na = parseFloat(a.id), nb = parseFloat(b.id);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    if (!isNaN(na)) return -1;
    if (!isNaN(nb)) return 1;
    return String(a.id).localeCompare(String(b.id));
  });
  TORRES_MAP = {};
  TORRES.forEach(t => TORRES_MAP[t.id] = t);
}

// ── FIREBASE ──────────────────────────────────────────────────
function initFirebase() {
  // Limpiar claves de versiones anteriores
  ['torres_v1','torres_v2','torres_v3','torres_v4','torres_v5'].forEach(k => {
    try { localStorage.removeItem(k); } catch {}
  });
  // Forzar reset si es la primera vez que se abre esta versión del archivo
  const APP_VERSION = 'v10-vanos-tendido';
  if (localStorage.getItem('app_version') !== APP_VERSION) {
    ['torres_v6','excel_imported_v7','torres_v7','excel_imported_v7'].forEach(k => { try { localStorage.removeItem(k); } catch {} });
    localStorage.setItem('app_version', APP_VERSION);
  }
  try {
    if (firebaseConfig.apiKey === 'TU_API_KEY_AQUI') {
      loadFromLS(); setSyncStatus('error','⚠️ Demo'); return;
    }
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    // Escuchar avances
    db.ref('avances').on('value', snap => {
      const raw = snap.val() || {};
      const data = purgarHuerfanos(mergeConBaseExcel(raw));
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
      // (Desactivado) Antes, si Firebase estaba vacío, se sembraba automáticamente
      // con la base del 08-06. Se desactiva porque el proyecto ya tiene avance real
      // cargado y esto era un riesgo: si el nodo se borra por error, repoblaría con
      // datos de prueba viejos en vez de quedar vacío (más seguro y visible).
      // if (!snap.exists() || Object.keys(raw).length === 0) {
      //   try { db.ref('avances').set(data); } catch(e) {}
      // }
      // Solo actualizar datos de torres que NO estamos editando ahora mismo
      // para no interrumpir sliders activos
      if (currentView === 'detalle' && currentTorreId) {
        // En detalle: mantener datos locales de la torre actual
        // (pueden estar más actualizados que Firebase si acaban de guardarse)
        const localTorre = avances[currentTorreId] || data[currentTorreId];
        avances = data;
        // Preferir versión local si fue actualizada más recientemente
        const localUpdated = localTorre && localTorre._updated;
        const remoteUpdated = data[currentTorreId] && data[currentTorreId]._updated;
        if (localTorre && (!remoteUpdated || localUpdated >= remoteUpdated)) {
          avances[currentTorreId] = localTorre;
        }
        updateGlobalPct();
      } else {
        avances = data;
        renderCurrentView();
      }
      setSyncStatus('synced','●');
    }, () => { loadFromLS(); setSyncStatus('error','● Error'); });
    // Escuchar torres manuales
    db.ref('torres_manuales').on('value', snap => {
      torresManuales = snap.val() ? Object.values(snap.val()) : [];
      buildTorresMap(); renderCurrentView();
    });
    // Escuchar pesos
    db.ref('config/pesos').on('value', snap => {
      if (snap.val()) { PESOS = snap.val(); localStorage.setItem('pesos_v2', JSON.stringify(PESOS)); }
    });
    db.ref('.info/connected').on('value', snap => {
      document.getElementById('offline-banner').style.display = snap.val() ? 'none' : 'block';
      setSyncStatus(snap.val()?'synced':'error', snap.val()?'●':'● Offline');
    });
    dbReady = true;
  } catch(e) { loadFromLS(); setSyncStatus('error','⚠️ Error'); }
}

function loadSectorTitles() {
  try {
    const s = localStorage.getItem('sector_titles');
    if (s) SECTOR_TITLES = Object.assign({}, DEFAULT_SECTOR_TITLES, JSON.parse(s));
  } catch {}
  if (dbReady && db) {
    db.ref('config/sector_titles').once('value', snap => {
      if (snap.val()) { SECTOR_TITLES = Object.assign({}, DEFAULT_SECTOR_TITLES, snap.val()); }
    });
  }
}
function saveSectorTitles() {
  try { localStorage.setItem('sector_titles', JSON.stringify(SECTOR_TITLES)); } catch {}
  if (dbReady && db) db.ref('config/sector_titles').set(SECTOR_TITLES);
  showToast('✅ Títulos guardados');
  renderCurrentView();
}
function resetSectorTitles() {
  SECTOR_TITLES = Object.assign({}, DEFAULT_SECTOR_TITLES);
  saveSectorTitles();

const STORAGE_KEY = 'torres_v8';

function tieneAvanceCargado(av) {
  if (!av || typeof av !== 'object') return false;
  return Object.keys(av).some(k => {
    if (k.startsWith('_') || k.startsWith('proto_')) return false;
    const v = av[k];
    return v === 'na' || (typeof v === 'number' && v > 0) || (typeof v === 'string' && v !== '' && v !== '0');
  });
}

function mergeConBaseExcel(data) {
  // La planilla del 08-06 queda como base permanente.
  // Firebase/localStorage pueden complementar o sobreescribir datos editados posteriormente.
  const merged = {};
  Object.keys(DATOS_EXCEL).forEach(id => {
    merged[id] = Object.assign({}, DATOS_EXCEL[id]);
  });
  if (data && typeof data === 'object' && !Array.isArray(data)) {
    Object.keys(data).forEach(id => {
      const av = data[id];
      if (!av || typeof av !== 'object' || Array.isArray(av)) return;
      merged[id] = Object.assign({}, merged[id] || {}, av);
    });
  }
  return merged;
}

function purgarHuerfanos(data) {
  // Conservar torres con fundación, impedimento, edición manual o cualquier avance de la planilla.
  const clean = {};
  Object.keys(data || {}).forEach(id => {
    const av = data[id];
    if (!av || typeof av !== 'object') return;
    const valido = av._fnd || av._impedimento || av._updated || tieneAvanceCargado(av);
    if (valido) clean[id] = av;
  });
  return clean;
}

function loadFromLS() {
  // Limpiar claves de versiones anteriores
  ['torres_v1','torres_v2','torres_v3','torres_v4','torres_v5'].forEach(k => {
    try { localStorage.removeItem(k); } catch {}
  });
  try {
    let raw = {};
    const s = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('torres_v6');
    if (s) {
      const parsed = JSON.parse(s);
      raw = (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) ? parsed : {};
    }
    const merged = mergeConBaseExcel(raw);
    avances = purgarHuerfanos(merged);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(avances)); } catch {}
  } catch { avances = purgarHuerfanos(mergeConBaseExcel({})); }
  try { const s = localStorage.getItem('torres_manuales'); torresManuales = s ? JSON.parse(s) : []; }
  catch { torresManuales = []; }
  buildTorresMap();
  renderCurrentView();
}

function setSyncStatus(state, label) {
  const color = state==='synced'?'#10b981':state==='syncing'?'#f59e0b':'#94a3b8';
  // Show softer indicator for error/offline states (normal in preview)
  const text = state==='error' ? (label&&label.includes('Demo')?'⚠️ Demo':'●') : (label||'●');
  ['sync-dot','sync-dot-desktop'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.color=color; el.textContent=text; }
  });
}

let saveTimer = null;
// saveAvance: guarda localStorage + Firebase inmediatamente (para checkboxes, selects)
function saveAvance(id) {
  if (!avances[id]) avances[id] = {};
  avances[id]._updated = new Date().toISOString();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(avances)); } catch {}
  setSyncStatus('syncing','● …');
  if (dbReady && db) {
    db.ref('avances/'+id).set(avances[id]||{})
      .then(() => { setSyncStatus('synced','●'); showToast('✅ Guardado'); })
      .catch(() => setSyncStatus('error','● Error'));
  } else { showToast('💾 Local'); setSyncStatus('','●'); }
}
// saveAvanceDebounced: para sliders — espera 800ms sin actividad para no saturar Firebase
function saveAvanceDebounced(id) {
  if (!avances[id]) avances[id] = {};
  avances[id]._updated = new Date().toISOString();
  setSyncStatus('syncing','● …');
  if (dbReady && db) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      db.ref('avances/'+id).set(avances[id]||{})
        .then(() => { setSyncStatus('synced','●'); showToast('✅ Guardado'); })
        .catch(() => setSyncStatus('error','● Error'));
    }, 800);
  } else { setSyncStatus('','●'); }
}

function saveTorreMaual(t) {
  try { localStorage.setItem('torres_manuales', JSON.stringify(torresManuales)); } catch {}
  if (dbReady && db) db.ref('torres_manuales/'+t.id).set(t);
}

// ── CÁLCULO ───────────────────────────────────────────────────
function vv(av, key) { return av[key]==='na'?1:(av[key]||0); }

// avgPatas: solo promedia patas que han sido explícitamente tocadas (valor > 0 o 'na')
// Una pata undefined/0 sin tocar = 0 y SÍ cuenta en el denominador
// Una pata 'na' = se excluye del promedio (no existe esa pata)
function avgPatas(av, eid) {
  let s=0, c=0;
  PATAS.forEach(p => {
    const val = av[pataKey(eid,p)];
    if (val === 'na') return; // excluir del promedio
    s += (val||0);
    c++;
  });
  return c ? s/c : 0;
}
function allPatasNA(av, eid) { return PATAS.every(p => av[pataKey(eid,p)] === 'na'); }
function valEtapa(av, eid) { return allPatasNA(av,eid) ? 1 : avgPatas(av,eid); }

// calcFnd: retorna 0 si _fnd='na' (no infla el global)
// La compensación se hace en calcGlobal ajustando el peso
function calcFnd(av) {
  if (!av._fnd) return 0;
  if (av._fnd === 'na') return 0;
  let etapas;
  if (av._fnd === 'ancla')       etapas = getEtapasAncla();
  else if (av._fnd === 'hormigon')   etapas = getEtapasHormigon();
  else if (av._fnd === 'tradicional') etapas = getEtapasTradicional();
  else return 0;
  return etapas.reduce((s,e) => s + valEtapa(av,e.id)*e.peso, 0);
}
function calcMnt(av) {
  return getEtapasMontaje().reduce((s,e) => s + vv(av,e.id)*e.peso, 0);
}
function calcGlobal(av) {
  const gen = getEtapasGenerales().reduce((s,e) => s + vv(av,e.id)*e.peso, 0);
  // Si todavía no se definió tipo de fundación, mostrar al menos el avance general importado desde la planilla.
  if (!av._fnd) return Math.min(1, gen);
  // Si fundación es N/A, su peso se redistribuye al montaje para no penalizar
  const fndPeso = av._fnd === 'na' ? 0 : PESOS.global_fnd;
  const mntPeso = av._fnd === 'na' ? PESOS.global_fnd + PESOS.global_mnt : PESOS.global_mnt;
  return Math.min(1, gen + calcFnd(av)*fndPeso + calcMnt(av)*mntPeso);
}
// ── ESTADOS DE TORRE ─────────────────────────────────────────
// isOOCCCivil: fundación 100% (Obras Civiles listas)
//   - Todas las partidas de fundación por pata = 100%
//   - NO requiere generales ni malla tierra
function isOOCCCivil(av) {
  if (!av._fnd || av._fnd==='na') return false;
  return calcFnd(av) >= 0.999;
}

// faseIcon: indica en qué fase de trabajo está la torre actualmente
// (reemplaza el ícono de ancla/ola que solo indicaba tipo Anclaje/Suspensión y generaba confusión)
function faseIcon(av, cfg) {
  if (!cfg) return '⚙️';
  if (isTerminada(av))     return '✓';
  if (isMontajeListo(av))  return 'G/A';
  if (isEnScopeMontaje(av)) return 'MNT';
  if (calcGlobal(av) > 0)  return 'FND';
  return '—';
}

// isEnScopeMontaje: una torre entra al tracking de "Montaje Estructuras" si su
// fundación ya está 100% lista, O si ya tiene cualquier avance real de montaje
// cargado (prearmado/montaje estructura/giro-aplome). Esto evita que torres con
// fundación en 95-99% (ej. falta solo Relleno y Compactado) queden invisibles
// en el dashboard pese a tener montaje ya en curso.
function isEnScopeMontaje(av) {
  if (!av._fnd || av._fnd==='na') return false;
  if (calcFnd(av) >= 0.999) return true;
  return (av.prearmado||0) > 0 || (av.montaje_estructura||0) > 0 || (av.giro_aplome_torque||0) > 0;
}

// calcOCMontajeStats: clasifica un conjunto de torres en los buckets de
// "Obras Civiles" y "Montaje Estructuras". Compartida entre el Dashboard
// (con todas las torres) y la vista "Por Sector" (con las torres de un tramo).
// kpiCard: tarjeta clicable usada en Obras Civiles / Montaje Estructuras.
// Si se pasa 'sector', el clic filtra la Lista a ese tramo + ese estado;
// si no, filtra la Lista globalmente (comportamiento original del Dashboard).
function kpiCard(val, label, sub, color, filtro, sector) {
  const onclickAttr = sector ? `goListaFiltradaSector('${filtro}','${sector}')` : `goListaFiltrada('${filtro}')`;
  return `<div class="kpi" style="border:1px solid ${color}44;cursor:pointer;text-align:center" onclick="${onclickAttr}">
    <div style="font-size:24px;font-weight:900;color:${color}">${val}</div>
    <div style="font-size:11px;font-weight:800;color:${color};margin-top:2px">${label}</div>
    ${sub?`<div style="font-size:9px;color:#64748b;margin-top:1px">${sub}</div>`:''}
  </div>`;
}

function calcOCMontajeStats(torres) {
  let oc_fndEnProceso=0, oc_fndLista=0, oc_mallaPend=0, oc_listaParaMontaje=0;
  let mnt_sinIniciar=0, mnt_prearmado=0, mnt_prearmadoListo=0, mnt_montajeProceso=0, mnt_montajeListo=0, mnt_terminada=0;
  torres.forEach(t => {
    const av = avances[t.id]||{};
    if (!av._fnd) return;
    const fnd = calcFnd(av);
    const malla = av.malla_tierra || 0;
    const genOK = isGeneralesOK(av);
    const prearmado = av.prearmado || 0;
    const montajeEstr = av.montaje_estructura || 0;
    const hasFndActivity = av._fnd && av._fnd!=='na' && (
      (av._fnd==='ancla'       && (av.trazado_anclas_p1||0) > 0) ||
      (av._fnd==='hormigon'    && (av.trazado_h_p1||0) > 0)      ||
      (av._fnd==='tradicional' && (av.trad_replanteo_p1||0) > 0)
    );
    if      (hasFndActivity && fnd < 0.999)            oc_fndEnProceso++;
    else if (fnd >= 0.999 && malla < 0.999)            oc_fndLista++;
    else if (fnd >= 0.999 && malla >= 0.999 && !genOK) oc_mallaPend++;
    else if (fnd >= 0.999 && genOK)                    oc_listaParaMontaje++;

    if (isEnScopeMontaje(av)) {
      const mallaOK = (av.malla_tierra||0) >= 0.999;
      const giroOK  = (av.giro_aplome_torque||0) >= 0.999;
      if      (montajeEstr >= 0.999 && giroOK && mallaOK) mnt_terminada++;
      else if (montajeEstr >= 0.999)                       mnt_montajeListo++;
      else if (montajeEstr > 0)                            mnt_montajeProceso++;
      else if (prearmado >= 0.999)                         mnt_prearmadoListo++;
      else if (prearmado > 0)                              mnt_prearmado++;
      else                                                 mnt_sinIniciar++;
    }
  });
  const oc_total = oc_fndEnProceso + oc_fndLista + oc_mallaPend + oc_listaParaMontaje;
  const mnt_total = mnt_sinIniciar + mnt_prearmado + mnt_prearmadoListo + mnt_montajeProceso + mnt_montajeListo + mnt_terminada;
  return {oc_fndEnProceso, oc_fndLista, oc_mallaPend, oc_listaParaMontaje, oc_total,
          mnt_sinIniciar, mnt_prearmado, mnt_prearmadoListo, mnt_montajeProceso, mnt_montajeListo, mnt_terminada, mnt_total};
}

// isGeneralesOK: todas las etapas generales (incluyendo malla tierra) = 100%
function isGeneralesOK(av) {
  if (!av._fnd) return false;
  return getEtapasGenerales().every(e => vv(av,e.id) >= 1);
}

// isOOCC: OOCC lista para montaje = fnd 100% + generales 100% (incluyendo malla)
function isOOCC(av) {
  if (!av._fnd) return false;
  if (av._fnd === 'na') return isGeneralesOK(av);
  return isGeneralesOK(av) && calcFnd(av) >= 0.999;
}

function isMontaje(av) { return calcMnt(av) >= 0.999; }
// Terminada = giro/aplome 100% + malla tierra 100%
function isTerminada(av) {
  return (av.giro_aplome_torque||0) >= 0.999 &&
         (av.malla_tierra||0) >= 0.999 &&
         calcFnd(av) >= 0.999;
}
// Montaje listo = montaje estructura 100% (aunque falte giro/aplome)
function isMontajeListo(av) {
  return (av.montaje_estructura||0) >= 0.999 && calcFnd(av) >= 0.999;
}
function isImpedimento(av) { return !!av._impedimento; }

// Estado granular (orden de prioridad)
function getEstado(av) {
  if (isImpedimento(av))             return 'impedimento';
  if (isTerminada(av))               return 'terminada';
  if (isMontajeListo(av))            return 'montajeListo'; // montaje 100%, falta giro/aplome
  if (isOOCC(av))                    return 'oocc';
  if (isOOCCCivil(av))               return 'ooccCivil';
  if (calcGlobal(av)>0)             return 'proceso';
  if (av._fnd)                       return 'sinInicio';
  return 'sinConfig';
}

function getColor(v) {
  if (v===0) return '#1e293b'; if (v<0.25) return '#7f1d1d';
  if (v<0.5) return '#b45309'; if (v<0.75) return '#1d4ed8';
  if (v<1)   return '#0f766e'; return '#15803d';
}
const pct = n => Math.round((n||0)*100);

// ── PROTOCOLO ─────────────────────────────────────────────────
function getTorreProtocolos(id) {
  const av = avances[id]||{}, result = [];
  if (!av._fnd) return result;
  getEtapasGenerales().forEach(e => {
    result.push({label:e.label, key:protoKey(e.id), estado:av[protoKey(e.id)]||'pendiente'});
  });
  if (av._fnd !== 'na') {
    const etapas = av._fnd==='ancla' ? getEtapasAncla() : av._fnd==='hormigon' ? getEtapasHormigon() : av._fnd==='tradicional' ? getEtapasTradicional() : [];
    etapas.forEach(e => {
      if (e.proto==='pata') {
        PATAS.forEach(p => result.push({label:e.label+' P'+p, key:protoPataKey(e.id,p), estado:av[protoPataKey(e.id,p)]||'pendiente'}));
      } else {
        result.push({label:e.label, key:protoKey(e.id), estado:av[protoKey(e.id)]||'pendiente'});
      }
    });
  }
  getEtapasMontaje().forEach(e => {
    result.push({label:e.label, key:protoKey(e.id), estado:av[protoKey(e.id)]||'pendiente'});
  });
  return result;
}

function countProtos(protos) {
  const cnt = {pendiente:0,emitido:0,observado:0,ok:0,na:0,total:0};
  protos.forEach(p => { cnt[p.estado]=(cnt[p.estado]||0)+1; cnt.total++; });
  cnt.pctOK = cnt.total ? Math.round((cnt.ok+cnt.na)/cnt.total*100) : 0;
  return cnt;
}

// Genera botones de % — seguro en móvil, sin riesgo de scroll accidental
// type: 'pata' | 'mnt'
// id: eid para pata, key para mnt
// p: número de pata (solo para type='pata')
function pctBtns(currentVal, type, id, p, color) {
  const col = color || '#f59e0b';
  const bg = col + '22';
  const steps = [0, 25, 50, 75, 100];
  const curPct = Math.round((currentVal||0)*100);
  const fn = type==='pata'
    ? `setPataValBtn('${id}',${p},VAL)`
    : `setMontajeBtn('${id}',VAL)`;
  const containerId = type==='pata' ? `patabtn_${id}_p${p}` : `mntbtn_${id}`;
  const manualId = type==='pata' ? `manual_${id}_p${p}` : `manual_mnt_${id}`;
  const applyFn = type==='pata'
    ? `applyManual('${id}',${p},'pata')`
    : `applyManual('${id}',0,'mnt')`;
  return `<div id="${containerId}" class="pct-btns" style="--fnd-color:${col};--fnd-bg:${bg}" data-color="${col}">
    ${steps.map(s => {
      const isActive = s === curPct;
      return `<button class="pct-btn${isActive?' active':''}"
        onclick="${fn.replace('VAL', s)}"
        style="${isActive?`border-color:${col};background:${bg};color:${col}`:''}"
      >${s===100?'✓':s+'%'}</button>`;
    }).join('')}
  </div>
  <div class="pct-manual">
    <input type="number" id="${manualId}" min="0" max="100" placeholder="${curPct}"
      style="border:1px solid ${col}44;color:${col}"
      onkeydown="if(event.key==='Enter')${applyFn}"
      onclick="this.select()"/>
    <span>%</span>
    <button onclick="${applyFn}"
      style="background:${col}22;border:1px solid ${col}44;color:${col};border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700">
      ✓ Aplicar
    </button>
  </div>`;
}
function badge(val) {
  const p=pct(val), bg=p===0?'#334155':p<25?'#7f1d1d':p<50?'#b45309':p<75?'#1d4ed8':p<100?'#0f766e':'#15803d';
  return `<span class="badge" style="background:${bg}">${p===100?'✓ 100%':p+'%'}</span>`;

function statusInfo(av) {
  if (isImpedimento(av))  return {label:'🔴 Con Impedimento',    c:'#f43f5e'};
  if (isTerminada(av))    return {label:'✅ Torre Terminada',     c:'#10b981'};

  if (isOOCC(av))         return {label:'🔩 OO.CC. + Malla ✓',  c:'#a78bfa'};

}

function getNavState() {
  return {view:currentView, torre:currentTorreId, vano:currentVanoId, hito:hitoSector, mapa:mapaSector, lista:listaSector, porSector:porSectorTramo};
}
function pushNavState() {
  if (suppressHistory || !window.history || !history.pushState) return;
  try { history.pushState(getNavState(), '', window.location.pathname + window.location.search); } catch(e) {}
}
function replaceNavState() {
  if (!window.history || !history.replaceState) return;
  try { history.replaceState(getNavState(), '', window.location.pathname + window.location.search); } catch(e) {}
}
function applyNavState(st) {
  if (!st) return;
  suppressHistory = true;
  currentView = st.view || 'dashboard';
  currentTorreId = st.torre || null;
  currentVanoId = st.vano || null;
  hitoSector = st.hito || null;
  mapaSector = st.mapa || null;
  listaSector = st.lista || null;
  porSectorTramo = st.porSector || null;
  openPartida = null;
  goView(currentView);
  suppressHistory = false;
}
window.addEventListener('popstate', e => {
  if (e.state) applyNavState(e.state);
});

function goView(v) {
  currentView = v; openPartida = null;
  if (v !== 'detalle') currentTorreId = null;
  if (v !== 'vanoDetalle') currentVanoId = null;
  // Actualizar tabs móvil
  document.querySelectorAll('.tab').forEach((b,i) => {
    b.classList.toggle('active', ['dashboard','mapa','lista','vanos','porSector','matriz','protocolos','hitos','config'][i]===v);
  });
  // Actualizar sidebar desktop
  ['dashboard','mapa','lista','vanos','porSector','matriz','protocolos','hitos','config'].forEach(name => {
    const btn = document.getElementById('sb-'+name);
    if (btn) btn.classList.toggle('active', name===v);
  });
  document.getElementById('lista-filters').classList.toggle('hidden', v!=='lista');
  document.getElementById('main-tabs').classList.toggle('hidden', v==='detalle');
  if (v!=='lista') { filtroSector=null; filtroEstado=null; }
  // En desktop: ocultar sidebar cuando se está en detalle
  const sidebar = document.getElementById('sidebar');
  if (sidebar && sidebar.style.display !== 'none') {
    sidebar.style.opacity = (v==='detalle'||v==='vanoDetalle') ? '0.4' : '1';
    sidebar.style.pointerEvents = (v==='detalle'||v==='vanoDetalle') ? 'none' : 'auto';
  }
  renderCurrentView();
  pushNavState();
}

  currentTorreId=id; currentView='detalle'; openPartida=null;
  document.getElementById('main-tabs').classList.add('hidden');
  document.getElementById('lista-filters').classList.add('hidden');
  // En desktop actualizar sidebar active state
  ['dashboard','mapa','lista','vanos','porSector','matriz','protocolos','hitos','config'].forEach(name => {
    const btn = document.getElementById('sb-'+name);

function updateGlobalPct() {
  const torresTotales = getTorresParaTotales();
  const total = torresTotales.length;
  if (total === 0) return;
  const suma = torresTotales.reduce((s,t) => {
    const av = avances[t.id]||{};
    return s + (av._fnd ? calcGlobal(av) : 0);
  }, 0);
  const g = pct(suma/total)+'%';
  // Actualizar todos los indicadores (móvil + desktop)
  ['global-pct','global-pct-desktop','global-pct-sidebar'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = g;
  });
  // Actualizar info de torres en sidebar
  const conf = TORRES.filter(t=>(avances[t.id]||{})._fnd).length;
  const infoEl = document.getElementById('sidebar-torres-info');
  if (infoEl) infoEl.textContent = `Línea 245 + especiales 6`;
}

function renderCurrentView() {
  updateGlobalPct();
  const c = document.getElementById('content');
  if (currentView==='dashboard')   c.innerHTML = renderDashboard();
  else if (currentView==='mapa')   c.innerHTML = renderMapa();
  else if (currentView==='lista')  c.innerHTML = renderLista();
  else if (currentView==='vanos') c.innerHTML = renderVanos();
  else if (currentView==='porSector') c.innerHTML = renderPorSector();
  else if (currentView==='matriz') c.innerHTML = renderMatriz();
  else if (currentView==='vanoDetalle' && currentVanoId) c.innerHTML = renderVanoDetalle(currentVanoId);
  else if (currentView==='protocolos') c.innerHTML = renderProtocolos();
  else if (currentView==='hitos')  c.innerHTML = renderHitos();
  else if (currentView==='config') c.innerHTML = renderConfig();
  else if (currentView==='detalle' && currentTorreId) c.innerHTML = renderDetalle(currentTorreId);
}

];
function getVanoTorres(vano) {
  const a=parseFloat(vano.desde), b=parseFloat(vano.hasta);
  return TORRES.filter(t=>{ const n=parseFloat(t.id); return !isNaN(n) && n>=a && n<=b; })
    .sort((x,y)=>parseFloat(x.id)-parseFloat(y.id));
}
function calcVano(vano) {
  const torres = getVanoTorres(vano);
  const total = torres.length || 1;
  let fndSum=0, mntSum=0, globalSum=0, fndOk=0, mntOk=0, restricciones=0, configuradas=0;
  torres.forEach(t=>{
    const av=avances[t.id]||{};
    if (av._fnd) configuradas++;
    const f=av._fnd?calcFnd(av):0, m=av._fnd?calcMnt(av):0, g=av._fnd?calcGlobal(av):0;
    fndSum+=f; mntSum+=m; globalSum+=g;
    if (f>=0.999) fndOk++;
    if (m>=0.999) mntOk++;
    if (isImpedimento(av)) restricciones++;
  });
  const fndPct=pct(fndSum/total), mntPct=pct(mntSum/total), globalPct=pct(globalSum/total);
  let estado='Sin iniciar', color='#64748b';
  if (restricciones>0) { estado='Con restricción'; color='#e11d48'; }
  else if (mntOk===torres.length && torres.length>0) { estado='Montaje terminado'; color='#059669'; }
  else if (mntSum>0) { estado='Montaje en ejecución'; color='#f59e0b'; }
  else if (fndOk===torres.length && torres.length>0) { estado='Listo para montaje'; color='#0891b2'; }
  else if (fndSum>0) { estado='Fundaciones en ejecución'; color='#2563eb'; }
  return {torres,total,configuradas,fndPct,mntPct,globalPct,fndOk,mntOk,restricciones,estado,color};
}
function renderMatriz() {
  const torres = TORRES.slice().sort((a,b)=>{
    const na=parseFloat(a.id), nb=parseFloat(b.id);
    if(!isNaN(na)&&!isNaN(nb)) return na-nb;
    return String(a.id).localeCompare(String(b.id));
  });

  const genCols = getEtapasGenerales();
  const anclaCols = getEtapasAncla();
  const hormCols = getEtapasHormigon().slice(0,3); // Trazado, Inst.Anclas, Excavación (match planilla visible cols)
  const mntCols = getEtapasMontaje();

  const cellPct = (v) => {
    const p = Math.round((v||0)*100);
    const bg = p>=100 ? '#bbf7d0' : p>0 ? '#fef9c3' : '#f1f5f9';
    const fg = p>=100 ? '#166534' : p>0 ? '#854d0e' : '#94a3b8';
    return `<td style="padding:4px 6px;text-align:center;background:${bg};color:${fg};font-weight:700;font-size:10px;white-space:nowrap">${p}%</td>`;
  };
  const cellTotal = (v) => {
    const p = Math.round((v||0)*100);
    const bg = p>=100 ? '#86efac' : p>0 ? '#fde68a' : '#e2e8f0';
    return `<td style="padding:4px 6px;text-align:center;background:${bg};font-weight:900;font-size:10px;white-space:nowrap">${p}%</td>`;
  };

  const rows = torres.map(t => {
    const av = avances[t.id] || {};
    const cfg = !!av._fnd;

function calcHitoEstado(hito) {
  const today = new Date(); today.setHours(0,0,0,0);
  if (hito.fecha_real) return { estado:'cumplido', label:'✅ Cumplido', color:'#10b981', dias:null };
  if (!hito.fecha_pm || hito.fecha_pm === 'POR DEFINIR')
    return { estado:'pendiente', label:'⏸ Por definir', color:'#475569', dias:null };
  const pm = new Date(hito.fecha_pm);
  const diff = Math.round((pm - today)/(1000*60*60*24));
  if (diff < 0)   return { estado:'atrasado',  label:`Atrasado ${Math.abs(diff)}d`, color:'#f43f5e', dias:diff };
  if (diff <= 30) return { estado:'en-riesgo', label:`Vence en ${diff}d`,           color:'#f59e0b', dias:diff };
  if (diff <= 90) return { estado:'proximo',   label:`En ${diff} días`,             color:'#3b82f6', dias:diff };
  return { estado:'ok', label:`En ${diff} días`, color:'#64748b', dias:diff };
}

function calcHitoAvanceTorres(hito) {
  let torres = [];
  if (hito.tramo === 'isla') {
    torres = TORRES.filter(t => { const n=parseFloat(t.id); return !isNaN(n) && n>=181 && n<=245; });
  } else if (hito.tramo === 'continente') {
    torres = TORRES.filter(t => { const n=parseFloat(t.id); return !isNaN(n) && n>=15 && n<=41; });
  } else if (hito.tramo === 'cruce') {
    if (hito.subtipo && hito.subtipo.includes('norte'))
      torres = TORRES.filter(t => ['1A','1B','2C'].includes(String(t.id)));
    else if (hito.subtipo && hito.subtipo.includes('sur'))
      torres = TORRES.filter(t => ['3C','4A','4B'].includes(String(t.id)));
    else
      torres = TORRES.filter(t => t.tramo === 'cruce');
  }
  if (!torres.length) return null;
  let terminadas=0, proceso=0, pendientes=0;
  torres.forEach(t => {
    const av = avances[t.id]||{};
    if (!av._fnd) { pendientes++; return; }
    const val = hito.tipo==='fundacion' ? calcFnd(av) : hito.tipo==='montaje' ? calcMnt(av) : -1;
    if (val < 0) { pendientes++; return; }
    if (val >= 0.999) terminadas++;
    else if (val > 0) proceso++;
    else pendientes++;
  });
  const total = torres.length;
  return { pct: total ? Math.round(terminadas/total*100) : 0, terminadas, proceso, pendientes, total };
}

function formatFechaDMY(iso) {
  if (!iso || iso === 'POR DEFINIR') return 'Por definir';
  const [y,m,d] = iso.split('-');
  return `${d}-${m}-${y}`;
}

// Stats for a list of torres
function getTorresSectorStats(torres) {
  let terminadas=0, montajeListo=0, montajeEnProceso=0, ooccCivil=0;
  let proceso=0, sinInicio=0, impedimento=0, sinConfig=0;
  let sumaAvance=0;
  torres.forEach(t => {
    const av = avances[t.id]||{};
    const est = getEstado(av);
    if (est==='sinConfig') { sinConfig++; return; }
    if (isImpedimento(av))   impedimento++;
    sumaAvance += calcGlobal(av);
    if      (est==='terminada')    terminadas++;
    else if (est==='montajeListo') montajeListo++;
    else if (est==='oocc')         montajeEnProceso++;  // OO.CC.+malla lista, montaje iniciado o no
    else if (est==='ooccCivil')    ooccCivil++;
    else if (est==='proceso')      proceso++;
    else if (est==='sinInicio')    sinInicio++;
  });
  // montajeEnProceso: torres con montaje iniciado pero no terminado
  // (oocc = fundación+generales listas, pueden tener montaje iniciado)
  const configured = terminadas + montajeListo + montajeEnProceso + ooccCivil + proceso + sinInicio + impedimento;
  const avancePct = torres.length ? Math.round(sumaAvance/torres.length*100) : 0;
  return { total:torres.length, configured, terminadas, montajeListo, montajeEnProceso, ooccCivil, proceso, sinInicio, impedimento, sinConfig, avancePct };
}

function getSectorStats(key) {
  const hitos = HITOS_DATA[key] || [];
  const total = hitos.length;
  const cumplidos  = hitos.filter(h => h.fecha_real).length;
  const atrasados  = hitos.filter(h => !h.fecha_real && calcHitoEstado(h).estado === 'atrasado').length;
  const enRiesgo   = hitos.filter(h => !h.fecha_real && calcHitoEstado(h).estado === 'en-riesgo').length;
  const proximos   = hitos.filter(h => !h.fecha_real && calcHitoEstado(h).estado === 'proximo').length;
  const pendientes = total - cumplidos - atrasados - enRiesgo - proximos;
  // Overall pct complete
  const pct = total ? Math.round(cumplidos/total*100) : 0;
  return { total, cumplidos, atrasados, enRiesgo, proximos, pendientes, pct };
}

// Load hito dates from Firebase/localStorage on init
function loadHitoFechas() {
  if (dbReady && db) {
    db.ref('hitos').once('value', snap => {
      const data = snap.val();
      if (!data) return;
      Object.keys(data).forEach(tramo => {
        if (!HITOS_DATA[tramo]) return;
        Object.keys(data[tramo]).forEach(n => {
          const h = HITOS_DATA[tramo].find(x=>x.n===parseInt(n));
          if (h && data[tramo][n].fecha_real) h.fecha_real = data[tramo][n].fecha_real;
        });
      });
    });
  } else {
    try {
      const saved = localStorage.getItem('hitos_fechas');
      if (saved) {
        const fechas = JSON.parse(saved);
        Object.keys(fechas).forEach(key => {
          const [tramo, n] = key.split('_');
          const h = HITOS_DATA[tramo] && HITOS_DATA[tramo].find(x=>x.n===parseInt(n));
          if (h && fechas[key]) h.fecha_real = fechas[key];
        });
      }
    } catch {}
  }
}

// Usa Firebase Storage para almacenar fotos comprimidas
// Clave en Firebase DB: fotos/TORRE_ID = [{url, nombre, fecha, size}]

let fotosStorage = null;

function initStorage() {
  if (!dbReady || !window.firebase) return;
  try {
    fotosStorage = firebase.storage();
    console.log("Firebase Storage ready");
  } catch(e) {
    console.warn("Firebase Storage no disponible — verifica que está habilitado en Firebase Console");
  }
}

// Comprimir imagen antes de subir (max 800px, calidad 0.75)
function comprimirImagen(file, maxSize=800, quality=0.75) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w=img.width, h=img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h*maxSize/w); w = maxSize; }
          else { w = Math.round(w*maxSize/h); h = maxSize; }
        }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function subirFoto(torreId, file) {
  if (!fotosStorage) {
    showToast('⚠️ Firebase Storage no disponible. Habilítalo en Firebase Console.');
    return null;
  }
  try {
    showToast('⏳ Comprimiendo imagen...');
    const compressed = await comprimirImagen(file);
    const fname = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g,'_')}`;
    const ref = fotosStorage.ref(`fotos/${torreId}/${fname}`);
    showToast('⏳ Subiendo foto...');
    await ref.put(compressed);
    const url = await ref.getDownloadURL();
    // Save metadata to Realtime DB
    const metadata = { url, nombre: file.name, fecha: new Date().toISOString().slice(0,10), size: Math.round(compressed.size/1024)+'KB' };
    await db.ref(`fotos/${torreId}`).push(metadata);
    showToast('✅ Foto subida correctamente');
    return metadata;
  } catch(e) {
    console.error('Error subiendo foto:', e);
    showToast('⚠️ Error al subir foto: ' + e.message);
    return null;
  }
}

async function eliminarFoto(torreId, fotoKey, url) {
  try {
    // Delete from Storage
    if (fotosStorage && url) {
      try { await fotosStorage.refFromURL(url).delete(); } catch(e) {}
    }
    // Delete from DB
    await db.ref(`fotos/${torreId}/${fotoKey}`).remove();
    showToast('🗑️ Foto eliminada');
    return true;
  } catch(e) {
    showToast('⚠️ Error al eliminar');
    return false;
  }
}

// ── MAPA ──────────────────────────────────────────────────────
function getSectorGroups() {
  const cont = TORRES.filter(t => t.sector==='Continente' && !t.tramo);
  const isla  = TORRES.filter(t => t.sector==='Isla' && !t.tramo);
  const T = SECTOR_TITLES; // editable titles from Config
  return [
    {
      key:'cont1',
      title: T.cont1_title || 'LAT Continente',
      subtitle:'T1 – T14',
      sub2: T.cont1_sub2 || 'Por definir',
      color:'#64748b',
      torres: cont.filter(t => { const n=parseFloat(t.id); return !isNaN(n) && n>=1 && n<=14; })
    },
    {
      key:'cont2',
      title: T.cont2_title || 'LAT Continente',
      subtitle:'T15 – T41',
      sub2: T.cont2_sub2 || 'Globaltec',
      color:'#8b5cf6',
      torres: cont.filter(t => { const n=parseFloat(t.id); return !isNaN(n) && n>=15 && n<=41; })
    },
    {
      key:'cont3',
      title: T.cont3_title || 'LAT Continente',
      subtitle:'T42 – T180',
      sub2: T.cont3_sub2 || 'Por definir',
      color:'#475569',
      torres: cont.filter(t => { const n=parseFloat(t.id); return !isNaN(n) && n>=42 && n<=180; })
    },
    {
      key:'isla',
      title: T.isla_title || 'LAT Lado Isla',
      subtitle:'T181 – T245',
      sub2: T.isla_sub2 || 'Globaltec',
      color:'#06b6d4',
      torres: isla
    },
    {
      key:'cruce',
      title: T.cruce_title || 'Cruce Canal de Chacao',
      subtitle:'1A · 1B · 2C · 3C · 4A · 4B',
      sub2: T.cruce_sub2 || 'CSTC',
      color:'#f59e0b',
      torres: TORRES.filter(t => t.tramo==='cruce')
    },
    {
      key:'se',
      title: T.se_title || 'Ampliación SE Tineo',
      subtitle:'Subestación',
      sub2: T.se_sub2 || 'Por definir',
      color:'#f43f5e',
      torres: TORRES.filter(t => t.tramo==='subestacion')
    },
  ].filter(s => s.torres.length > 0);
}

  const btns = arr => arr.map(t => {
    const av=avances[t.id]||{}, cfg=!!av._fnd, g=cfg?calcGlobal(av):null;
    const imp=isImpedimento(av);
    const isA=t.tipo.toLowerCase().includes('anclaje');

    const est_t = cfg ? getEstado(avances[t.id]||{}) : null;
    const bg = imp?'#7f1d1d': t.estado_tramo==='pendiente'?'#0c1220':

// ── LISTA ─────────────────────────────────────────────────────
function renderLista() {
  // Antes pedía elegir un sector primero; ahora muestra todas las torres de
  // inmediato. listaSector sigue funcionando como filtro opcional (vía clic
  // desde Mapa, Por Sector, o el dashboard), pero ya no es obligatorio.

  // Level 2: show torres of selected sector with filters
  const groups = getSectorGroups();
  const sectorGroup = listaSector ? groups.find(s => s.key === listaSector) : null;
  const sectorTorres = sectorGroup ? sectorGroup.torres.map(t=>t.id) : null;

  let lista = TORRES
    .filter(t => {
      const av=avances[t.id]||{};
      // Filter by sector group if selected
      if (sectorTorres && !sectorTorres.includes(t.id)) return false;
      if (!sectorTorres) {
        if (filtroSector && t.sector!==filtroSector) return false;
        if (filtroTramo === 'globaltec' && t.contratista !== 'Globaltec') return false;
        if (filtroTramo === 'sinasignar' && t.contratista !== 'Sin asignar') return false;
      }
      if (filtroEstado) {
        const est=getEstado(av);
        if (filtroEstado==='terminada'    && est!=='terminada')    return false;
        if (filtroEstado==='impedimento'  && !isImpedimento(av))  return false;
        if (filtroEstado==='montajeListo' && est!=='montajeListo') return false;
        if (filtroEstado==='oocc'         && est!=='oocc')         return false;
        // ooccCivil = todas con fnd 100% (incluye montajeListo, oocc, ooccCivil)
        if (filtroEstado==='ooccCivil'    && !isOOCCCivil(av))    return false;
        // montaje sub-states
        if (filtroEstado==='mntSinIniciar' && !(isEnScopeMontaje(av) && (av.prearmado||0)<0.001 && (av.montaje_estructura||0)<0.001)) return false;
        if (filtroEstado==='mntPrearmado'  && !((av.prearmado||0)>0 && (av.prearmado||0)<0.999 && (av.montaje_estructura||0)<0.001 && isEnScopeMontaje(av))) return false;
        if (filtroEstado==='mntPrearmadoListo' && !((av.prearmado||0)>=0.999 && (av.montaje_estructura||0)<0.001 && isEnScopeMontaje(av))) return false;
        if (filtroEstado==='mntMontajeProceso' && !((av.montaje_estructura||0)>0 && (av.montaje_estructura||0)<0.999 && isEnScopeMontaje(av))) return false;
        if (filtroEstado==='mntMontaje'    && !(est==='montajeListo')) return false;
        if (filtroEstado==='proceso'      && est!=='proceso')      return false;
        if (filtroEstado==='sinInicio'    && est!=='sinInicio')    return false;
      }
      if (searchQuery && !String(t.id).includes(searchQuery) && !t.tipo.toLowerCase().includes(searchQuery.toLowerCase())) return false;
      return true;
    })
    .sort((a,b) => {
      const na=parseFloat(a.id), nb=parseFloat(b.id);
      if (!isNaN(na)&&!isNaN(nb)) return na-nb;
      return String(a.id).localeCompare(String(b.id));
    });

  const sectorHeaderHtml = sectorGroup ? `
    <div style="display:flex;align-items:center;gap:10px;background:#1e293b;border-radius:10px;padding:10px 14px;margin-bottom:10px;border-left:3px solid ${sectorGroup.color}">
      <span style="font-size:20px">${sectorGroup.icon}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#f8fafc">${sectorGroup.title}</div>
        <div style="font-size:10px;color:#475569">${sectorGroup.subtitle} · <span style="color:${sectorGroup.color}">${sectorGroup.sub2}</span></div>
      </div>
      <button onclick="setListaSector(null)" style="background:none;border:none;color:#f59e0b;font-size:12px;cursor:pointer">← Volver</button>
    </div>` : '';

  return `<div style="padding-bottom:40px">
    ${sectorHeaderHtml}
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input type="text" placeholder="Buscar torre…" value="${searchQuery}"
        oninput="searchQuery=this.value;renderCurrentView()" style="flex:1"/>
      <button class="action-btn btn-primary" onclick="openAgregarTorre()" style="width:auto;padding:8px 14px;margin:0;font-size:12px">+ Torre</button>
    </div>
    ${lista.map(t => {
      const av=avances[t.id]||{}, cfg=!!av._fnd;
      const g=cfg?calcGlobal(av):null, fnd=cfg?calcFnd(av):null, mnt=cfg?calcMnt(av):null;
      const fndTag=av._fnd==='ancla'?'⚓ Cabezal':av._fnd==='hormigon'?'🏗️ Hormigón':av._fnd==='na'?'✖️ N/A':'⚙️';
      const si=statusInfo(av);
      const protos=getTorreProtocolos(t.id);
      const cnt=countProtos(protos);
      const borderC=isImpedimento(av)?'#f43f5e':cfg?getColor(g):'#334155';
      const updated=av._updated?formatDate(av._updated):'—';
      return `<div class="torre-item" style="border-left-color:${borderC}" onclick="goDetalle('${t.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span class="torre-name">Torre ${t.id} <span style="font-size:10px;color:#475569;font-weight:400">${t.modelo}</span></span>
          <span style="font-size:9px;font-weight:700;color:${si.c};background:${si.c}22;border-radius:5px;padding:2px 7px">${si.label}</span>
        </div>
        <div class="torre-meta">
          <span>${t.tipo}</span><span>·</span><span>${t.sector}</span>
          ${t.contratista?`<span class="tramo-badge ${t.contratista==='Globaltec'?'tramo-globaltec':t.contratista==='CSTC'?'tramo-cstc':t.estado_tramo==='pendiente'?'tramo-pendiente':''}">${t.contratista}</span>`:''}
          ${t.tramo==='cruce'?'<span class="tramo-badge tramo-cruce">⛓️ Cruce</span>':''}
          ${t.estado_tramo==='pendiente'?'<span class="tramo-badge tramo-pendiente">Sin asignar</span>':''}
        </div>
        ${isImpedimento(av)?`<div style="font-size:10px;color:#f43f5e;margin-bottom:4px">🔴 ${av._impedimento_nota||'Sin nota'}</div>`:''}
        ${cfg?bar(g,null,4):''}
        <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">
          ${cfg?`<span style="font-size:9px;color:#64748b">Fnd: ${pct(fnd)}%</span><span style="font-size:9px;color:#64748b">Mnt: ${pct(mnt)}%</span>`:''}
          ${cnt.total>0?`<span style="font-size:9px;color:#10b981">✓${cnt.ok}/${cnt.total}</span>`:''}
          <span style="font-size:9px;color:#334155">🕐${updated}</span>
          ${getPrimeraFechaInicio(avances[t.id]||{}) ? `<span style="font-size:9px;color:#60a5fa">🗓️ ${getPrimeraFechaInicio(avances[t.id]||{})}</span>` : ''}
          ${getUltimaFechaCompletado(avances[t.id]||{}) ? `<span style="font-size:9px;color:#10b981">🏁 ${getUltimaFechaCompletado(avances[t.id]||{})}</span>` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── PROTOCOLOS ────────────────────────────────────────────────
function renderProtocolos() {
  return `<div style="padding-bottom:40px">
    <div style="font-size:10px;color:#475569;letter-spacing:1px;margin-bottom:10px">RESUMEN DE PROTOCOLOS</div>
    ${renderProtoKPIs()}
    <div style="display:flex;gap:7px;margin-bottom:12px">
      <button class="proto-tab ${protoSubView==='torre'?'active':''}" onclick="setProtoSubView('torre')">Por Torre</button>
      <button class="proto-tab ${protoSubView==='partida'?'active':''}" onclick="setProtoSubView('partida')">Por Partida</button>
    </div>
    ${protoSubView==='torre' ? renderProtoByTorre() : renderProtoByPartida()}
  </div>`;
}

function renderProtoKPIs() {
  const total={pendiente:0,emitido:0,observado:0,ok:0,na:0,total:0};
  TORRES.forEach(t => getTorreProtocolos(t.id).forEach(x=>{total[x.estado]=(total[x.estado]||0)+1;total.total++;}));
  const pctOK=total.total?Math.round((total.ok+total.na)/total.total*100):0;
  return `<div class="card" style="border:1px solid #10b98133;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px">
      <span style="font-size:11px;color:#94a3b8;letter-spacing:1px">PROTOCOLOS GLOBALES</span>
      <span style="font-size:24px;font-weight:900;color:#10b981">${pctOK}%</span>
    </div>
    ${bar(pctOK/100,'#10b981',8)}
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">
      ${PROTO_STATES.map(s=>`<div class="proto-chip" style="background:${s.bg};color:${s.color}">
        <span style="font-size:12px;font-weight:900">${total[s.id]||0}</span><span>${s.label}</span></div>`).join('')}
      <div class="proto-chip" style="background:#0f172a;color:#475569">
        <span style="font-size:12px;font-weight:900">${total.total}</span><span>Total</span></div>
    </div>
  </div>`;
}

function renderProtoByTorre() {
  const lista = TORRES
    .filter(t => (avances[t.id]||{})._fnd)
    .sort((a,b) => Number(a.id)-Number(b.id));
  if (!lista.length) return `<div style="text-align:center;color:#475569;padding:30px">No hay torres configuradas</div>`;
  return lista.map(t => {
    const protos=getTorreProtocolos(t.id), cnt=countProtos(protos);
    const stateBar=PROTO_STATES.map(s=>{
      const w=cnt.total?Math.round((cnt[s.id]||0)/cnt.total*100):0;
      return w>0?`<div style="height:100%;width:${w}%;background:${s.color}"></div>`:'';
    }).join('');
    return `<div class="proto-tower-card" onclick="goDetalle('${t.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <div style="font-size:14px;font-weight:800;color:#f59e0b">Torre ${t.id} <span style="font-size:10px;color:#475569;font-weight:400">${TORRES_MAP[t.id].modelo}</span></div>
        <span style="font-size:16px;font-weight:900;color:#10b981">${cnt.pctOK}%</span>
      </div>
      <div style="background:#0f172a;border-radius:99px;height:7px;overflow:hidden;display:flex;margin-bottom:7px">${stateBar}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${PROTO_STATES.filter(s=>(cnt[s.id]||0)>0).map(s=>`
          <div class="proto-chip" style="background:${s.bg};color:${s.color}">
            <span style="font-size:11px;font-weight:900">${cnt[s.id]}</span><span>${s.label}</span></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderProtoByPartida() {
  const partidas = {};
  TORRES.forEach(t => {
    const av=avances[t.id]||{};
    if (!av._fnd) return;
    const addProto = (label, key) => {
      if (!partidas[label]) partidas[label]={pendiente:0,emitido:0,observado:0,ok:0,na:0,total:0};
      const est=av[key]||'pendiente';
      partidas[label][est]++; partidas[label].total++;
    };
    getEtapasGenerales().forEach(e => addProto(e.label, protoKey(e.id)));
    if (av._fnd!=='na') {
      const etapas=av._fnd==='ancla'?getEtapasAncla():av._fnd==='hormigon'?getEtapasHormigon():getEtapasTradicional();
      etapas.forEach(e => {
        if (e.proto==='pata') PATAS.forEach(p => addProto(e.label+' – Pata '+p, protoPataKey(e.id,p)));
        else addProto(e.label, protoKey(e.id));
      });
    }
    getEtapasMontaje().forEach(e => addProto(e.label, protoKey(e.id)));
  });
  return Object.keys(partidas).map(nombre => {
    const d=partidas[nombre];
    const pOK=d.total?Math.round((d.ok+d.na)/d.total*100):0;
    const stateBar=PROTO_STATES.map(s=>{
      const w=d.total?Math.round((d[s.id]||0)/d.total*100):0;
      return w>0?`<div style="height:100%;width:${w}%;background:${s.color}"></div>`:'';
    }).join('');
    return `<div class="partida-summary">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <div style="font-size:11px;font-weight:700;color:#cbd5e1">${nombre}</div>
        <span style="font-size:14px;font-weight:900;color:#10b981">${pOK}%</span>
      </div>
      <div style="background:#0f172a;border-radius:99px;height:5px;overflow:hidden;display:flex;margin-bottom:6px">${stateBar}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${PROTO_STATES.map(s=>`<div class="proto-chip" style="background:${s.bg};color:${s.color}">
          <span style="font-size:10px;font-weight:900">${d[s.id]||0}</span><span>${s.label}</span></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── CONFIG ────────────────────────────────────────────────────
function renderConfig() {

  const genTotal = ['gen_liberacion','gen_perturbacion','gen_tala_roce','gen_accesos','gen_replanteo','gen_malla_tierra'].reduce((s,k)=>s+(PESOS[k]||0),0);
  const anclaTotal = ['ancla_trazado_anclas','ancla_inst_anclas','ancla_montaje_cabezal','ancla_grouting'].reduce((s,k)=>s+(PESOS[k]||0),0);
  const hormTotal = ['horm_trazado_h','horm_inst_anclas_h','horm_excavacion','horm_armadura_zapatas','horm_armadura_vastagos','horm_inst_stubs','horm_moldajes','horm_hormigonado','horm_relleno_compact'].reduce((s,k)=>s+(PESOS[k]||0),0);
  const mntTotal = ['mnt_recepcion_material','mnt_prearmado','mnt_montaje_estructura','mnt_giro_aplome_torque'].reduce((s,k)=>s+(PESOS[k]||0),0);
  const globalTotal = genTotal + (PESOS.global_fnd||0) + (PESOS.global_mnt||0);

  // % real = peso_interno × peso_bloque
  const realPct = (k) => {
    if (k.startsWith('gen_')) return (PESOS[k]||0)*100;
    if (k.startsWith('ancla_')) return (PESOS[k]||0)*(PESOS.global_fnd||0)*100;
    if (k.startsWith('horm_')) return (PESOS[k]||0)*(PESOS.global_fnd||0)*100;
    if (k.startsWith('mnt_')) return (PESOS[k]||0)*(PESOS.global_mnt||0)*100;
    return (PESOS[k]||0)*100;
  };

  const fieldRow = (k, lbl, hint='') => {
    const rp = realPct(k).toFixed(1);
    return `<div class="config-row" style="margin-bottom:10px">

        <div style="font-size:12px;color:#cbd5e1">${lbl}</div>

        <span style="font-size:11px;color:#10b981;font-weight:700;min-width:36px;text-align:right">${rp}%</span>

          value="${(PESOS[k]||0).toFixed(3)}"
          onchange="PESOS['${k}']=parseFloat(this.value)||0;renderCurrentView()"
          style="width:64px"/>
      </div>
    </div>`;
  };

  const genOK = Math.abs(genTotal + (PESOS.global_fnd||0) + (PESOS.global_mnt||0) - 1) < 0.005;
  const anclaOK = Math.abs(anclaTotal - 1) < 0.005;
  const tradTotal = ['trad_replanteo','trad_escarpe','trad_excavacion','trad_sello','trad_emplantillado','trad_enfierraduras','trad_moldajes','trad_horm_zapata','trad_pernos_anclaje','trad_horm_pedestal','trad_relleno_compact','trad_malla_pat'].reduce((s,k)=>s+(PESOS[k]||0),0);
  const tradOK = Math.abs(tradTotal - 1) < 0.005;
  const hormOK = Math.abs(hormTotal - 1) < 0.005;

  const sectionHeader = (icon, title, subtotal, subtotalLabel, isOK) => `

}
function confirmarLimpiarLocal() {
  ['torres_v1','torres_v2','torres_v3','torres_v4','torres_v5','torres_v6','torres_v8','torres_manuales','pesos_v1','pesos_v2','app_version'].forEach(k => {
    try { localStorage.removeItem(k); } catch {}
  });
  avances = {};
  torresManuales = [];
  buildTorresMap();
  closeModal();
  showToast('✅ Caché local limpiado');
  if (dbReady && db) {
    // Forzar recarga desde Firebase
    db.ref('avances').once('value', snap => {
      avances = snap.val() || {};
      renderCurrentView();
    });
  } else {
    renderCurrentView();
  }
}

function confirmarAgregarTorre() {
  const id = parseInt(document.getElementById('nt-id').value);
  if (!id || isNaN(id)) { showToast('⚠️ Ingresa un número de torre'); return; }
  if (TORRES_MAP[id]) { showToast('⚠️ Torre '+id+' ya existe'); return; }
  const t = {
    id, tipo: document.getElementById('nt-tipo').value,
    modelo: document.getElementById('nt-modelo').value || '—',
    sector: document.getElementById('nt-sector').value,
    manual: true,
  };
  torresManuales.push(t);
  buildTorresMap();
  saveTorreMaual(t);
  closeModal();
  showToast('✅ Torre '+id+' agregada');
  goView('lista');
}

function eliminarTorreManual(id) {
  torresManuales = torresManuales.filter(t => t.id !== id);
  buildTorresMap();
  try { localStorage.setItem('torres_manuales', JSON.stringify(torresManuales)); } catch {}
  if (dbReady && db) db.ref('torres_manuales/'+id).remove();
  showToast('Torre '+id+' eliminada');
  renderCurrentView();
}

// Definición del esquema de columnas del Excel
function getExcelSchema() {
  return {
    // Columnas de identificación (siempre presentes)
    id: [
      {col:'Torre',       get: t=>t.id,                      type:'id'},
      {col:'Sector',      get: t=>t.sector,                  type:'id'},
      {col:'Contratista', get: t=>t.contratista||'—',        type:'id'},
      {col:'Tipo',        get: t=>t.tipo,                    type:'id'},
      {col:'Modelo',      get: t=>t.modelo||'—',             type:'id'},
      {col:'Tipo_Fnd',    get: (t,av)=>av._fnd||'',         type:'fnd_type'},
      {col:'Pata',        get: ()=>'',                       type:'pata'},
    ],
    // Resumen calculado (lectura, no importar)
    resumen: [
      {col:'Avance_Global%', get:(t,av)=>av._fnd?Math.round(calcGlobal(av)*100):0, type:'calc'},
      {col:'Fnd%',           get:(t,av)=>av._fnd?Math.round(calcFnd(av)*100):0,    type:'calc'},
      {col:'Mnt%',           get:(t,av)=>av._fnd?Math.round(calcMnt(av)*100):0,    type:'calc'},
      {col:'Estado',         get:(t,av)=>statusInfo(av).label.replace(/[^\w\sáéíóúñ%]/gi,'').trim(), type:'calc'},
      {col:'Impedimento',    get:(t,av)=>av._impedimento?'Sí':'No',                type:'calc'},
      {col:'Nota_Impedimento',get:(t,av)=>av._impedimento_nota||'',               type:'calc'},
    ],
    // Etapas generales (fila pata=0)
    generales: [
      {col:'Gen_Liberacion',   key:'liberacion'},
      {col:'Gen_Perturbacion', key:'perturbacion'},
      {col:'Gen_TalaRoce',     key:'tala_roce'},
      {col:'Gen_Accesos',      key:'accesos'},
      {col:'Gen_Replanteo',    key:'replanteo'},
      {col:'Gen_MallaTierra',  key:'malla_tierra'},
    ],
    // Fundación Cabezal Metálico (ancla)
    ancla: [
      {col:'Fnd_TrazadoAnclas',   key:'trazado_anclas'},
      {col:'Fnd_InstAnclas',      key:'inst_anclas'},
      {col:'Fnd_MontajeCabezal',  key:'montaje_cabezal'},
      {col:'Fnd_Grouting',        key:'grouting'},

    // Fundación Cabezal de Hormigón
    hormigon: [
      {col:'Fnd_TrazadoH',        key:'trazado_h'},
      {col:'Fnd_InstAnclasH',     key:'inst_anclas_h'},
      {col:'Fnd_Excavacion',      key:'excavacion'},
      {col:'Fnd_ArmZapatas',      key:'armadura_zapatas'},
      {col:'Fnd_ArmVastagos',     key:'armadura_vastagos'},
      {col:'Fnd_InstStubs',       key:'inst_stubs'},
      {col:'Fnd_Moldajes',        key:'moldajes'},
      {col:'Fnd_Hormigonado',     key:'hormigonado'},
      {col:'Fnd_RellenoCompact',  key:'relleno_compact'},
    ],
    // Fundación Tradicional
    tradicional: [
      {col:'Fnd_Replanteo',       key:'trad_replanteo'},
      {col:'Fnd_Escarpe',         key:'trad_escarpe'},
      {col:'Fnd_Excavacion',      key:'trad_excavacion'},
      {col:'Fnd_Sello',           key:'trad_sello'},
      {col:'Fnd_Emplantillado',   key:'trad_emplantillado'},
      {col:'Fnd_Enfierraduras',   key:'trad_enfierraduras'},
      {col:'Fnd_Moldajes',        key:'trad_moldajes'},
      {col:'Fnd_HormZapata',      key:'trad_horm_zapata'},
      {col:'Fnd_PernasAnclaje',   key:'trad_pernos_anclaje'},
