function exportarExcel() {
  try {
    const wb = XLSX.utils.book_new();
    const schema = getExcelSchema();
    const today = new Date().toLocaleDateString('es-CL');

    // ── HOJA 1: AVANCE POR PATA (editable + importable) ──
    // Encabezados = todas las columnas posibles (ancla + hormigon + tradicional)
    const allFndCols = [...schema.ancla, ...schema.hormigon, ...schema.tradicional];
    // Deduplicate by col name
    const fndColsMap = {};
    allFndCols.forEach(c => { if (!fndColsMap[c.col]) fndColsMap[c.col] = c; });
    const fndCols = Object.values(fndColsMap);

    const header = [
      ...schema.id.map(c=>c.col),
      ...schema.resumen.map(c=>c.col),
      ...schema.generales.map(c=>c.col),
      ...fndCols.map(c=>c.col),
      ...schema.montaje.map(c=>c.col),
      'Fecha_Inicio','Fecha_Termino','Ultimo_Update',
    ];

    // Row 1: Instructions
    const instrRow = ['INSTRUCCIONES: Edita los valores de 0-100 en las columnas Fnd_ y Mnt_. No modificar columnas Torre,Sector,Tipo,Modelo. Importar con botón "Importar Excel".'];
    // Row 2: Color guide
    const colorRow = ['Columnas editables: Tipo_Fnd (ancla/hormigon/tradicional/na) | Gen_* Mnt_* → Pata=0 | Fnd_* → Pata=1,2,3,4'];
    // Row 3: header
    const rows = [instrRow, colorRow, header];

    TORRES.sort((a,b)=>{
      const na=parseFloat(a.id),nb=parseFloat(b.id);
      if(!isNaN(na)&&!isNaN(nb))return na-nb;
      return String(a.id).localeCompare(String(b.id));
    }).forEach(t => {
      const av = avances[t.id]||{};
      const cfg = !!av._fnd;

      const idVals = schema.id.map(c => c.get(t,av));
      const resVals = schema.resumen.map(c => c.get(t,av));
      const genVals = schema.generales.map(c => cfg ? Math.round((av[c.key]||0)*100) : '');
      const mntVals = schema.montaje.map(c => cfg ? Math.round((av[c.key]||0)*100) : '');

      // Row pata=0: torre-level data (generales + montaje)
      const fndVals0 = fndCols.map(()=>''); // blank fnd for pata=0 row
      rows.push([
        ...idVals.map((v,i)=>i===6?0:v), // Pata=0
        ...resVals,
        ...genVals,
        ...fndVals0,
        ...mntVals,
        getPrimeraFechaInicio(av)||'',
        getUltimaFechaCompletado(av)||'',
        av._updated ? formatDate(av._updated) : '',
      ]);

      // Rows pata=1..4: foundation data
      if (cfg && av._fnd !== 'na') {
        [1,2,3,4].forEach(p => {
          const fndValsP = fndCols.map(fc => {
            const val = av[fc.key+'_p'+p];
            return val !== undefined ? Math.round(val*100) : '';
          });
          rows.push([
            ...idVals.map((v,i)=>i===6?p:v), // Pata=p
            ...resVals.map(()=>''), // no resumen for pata rows
            ...schema.generales.map(()=>''), // no gen for pata rows
            ...fndValsP,
            ...schema.montaje.map(()=>''), // no montaje for pata rows
            '','','',
          ]);
        });
      }
    });

    const ws1 = XLSX.utils.aoa_to_sheet(rows);

    // Column widths
    ws1['!cols'] = header.map(h => ({
      wch: h.startsWith('Fnd_')||h.startsWith('Mnt_')||h.startsWith('Gen_') ? 14 :
           h==='Torre' ? 7 : h==='Nota_Impedimento' ? 25 : 14
    }));

    // Freeze top 3 rows + first column
    ws1['!freeze'] = {xSplit:1, ySplit:3, topLeftCell:'B4'};

    XLSX.utils.book_append_sheet(wb, ws1, 'Avance x Pata');

    // ── HOJA 2: RESUMEN POR TORRE ──
    const hdr2 = ['Torre','Sector','Contratista','Tipo','Modelo','Tipo_Fnd',
                  'Avance_Global%','Fnd%','Mnt%','Estado','Impedimento','Nota_Impedimento',
                  'Hito_Multable','Primera_Inicio','Ultima_Termino','Ultimo_Update'];
    const rows2 = [hdr2];
    TORRES.forEach(t => {
      const av=avances[t.id]||{}, cfg=!!av._fnd;
      const n=parseFloat(t.id);
      let hito='—';
      if(!isNaN(n)&&n>=15&&n<=41) hito=calcFnd(av)>=0.999?'Hito 1':'Hito 2';
      rows2.push([
        t.id, t.sector, t.contratista||'—', t.tipo, t.modelo||'—',
        av._fnd||'Sin config',
        cfg?Math.round(calcGlobal(av)*100):0,
        cfg?Math.round(calcFnd(av)*100):0,
        cfg?Math.round(calcMnt(av)*100):0,
        statusInfo(av).label.replace(/[^\w\sáéíóúñ%]/gi,'').trim(),
        av._impedimento?'Sí':'No',
        av._impedimento_nota||'',
        hito,
        getPrimeraFechaInicio(av)||'—',
        getUltimaFechaCompletado(av)||'—',
        av._updated?formatDate(av._updated):'—',
      ]);
    });
    const ws2 = XLSX.utils.aoa_to_sheet(rows2);
    ws2['!cols'] = hdr2.map(h=>({wch: h==='Nota_Impedimento'?25:h==='Torre'?7:14}));
    XLSX.utils.book_append_sheet(wb, ws2, 'Resumen Torres');

    // ── HOJA 3: PROTOCOLOS ──
    const rows3=[['Torre','Sector','Bloque','Partida','Estado Protocolo']];
    TORRES.forEach(t=>{
      getTorreProtocolos(t.id).forEach(p=>rows3.push([t.id,t.sector,p.bloque||'—',p.label,p.estado]));
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows3), 'Protocolos');

    // ── HOJA 4: HITOS ──
    const rows4=[['Tramo','N°','Descripción','Fecha PM','Fecha Doc','Fecha Real','Estado','Días','Avance%','Meta%']];
    Object.keys(HITOS_DATA).forEach(tramo=>{
      HITOS_DATA[tramo].forEach(h=>{
        const est=calcHitoEstado(h);
        const av2=calcHitoAvanceTorres(h);
        rows4.push([tramo.toUpperCase(),h.n,h.desc,h.fecha_pm||'Por definir',
          h.fecha_doc||'—',h.fecha_real||'—',
          est.label.replace(/[^\w\sáéíóúñ%]/gi,'').trim(),
          est.dias!==null?Math.abs(est.dias):'—',
          av2?av2.pct:'—', h.meta_pct]);
      });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows4), 'Hitos Multables');

    XLSX.writeFile(wb, 'LT_Tineo_Ancud_'+new Date().toISOString().slice(0,10)+'.xlsx');
    showToast('✅ Excel exportado — 4 hojas');
  } catch(e) { console.error(e); showToast('⚠️ Error: '+e.message); }
}

function importarExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const schema = getExcelSchema();

      // Build key lookup: col name → {type, key, fnd_type}
      const colMap = {};
      schema.generales.forEach(c => { colMap[c.col] = {type:'gen', key:c.key}; });
      schema.ancla.forEach(c => { colMap[c.col] = {type:'fnd', key:c.key, fnd:'ancla'}; });
      schema.hormigon.forEach(c => { colMap[c.col] = {type:'fnd', key:c.key, fnd:'hormigon'}; });
      schema.tradicional.forEach(c => { colMap[c.col] = {type:'fnd', key:c.key, fnd:'tradicional'}; });
      schema.montaje.forEach(c => { colMap[c.col] = {type:'mnt', key:c.key}; });

      // Try reading "Avance x Pata" first, then "Datos Raw"
      let sheet = wb.Sheets['Avance x Pata'];
      const sheetName = sheet ? 'Avance x Pata' : null;
      if (!sheet) sheet = wb.Sheets['Datos Raw'];
      if (!sheet) { showToast('⚠️ No se encontró hoja "Avance x Pata" ni "Datos Raw"'); return; }

      const imported = {};
      let errCount = 0;

      if (sheetName === 'Avance x Pata') {
        // New format: one row per pata
        // Find header row (row index 2 = 3rd row)
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
        // Find header row (contains "Torre")
        let hdrIdx = rows.findIndex(r => r.includes('Torre'));
        if (hdrIdx < 0) { showToast('⚠️ No se encontró fila de encabezados'); return; }
        const hdr = rows[hdrIdx].map(h => String(h).trim());

        // Column indices
        const iD = {
          torre:     hdr.indexOf('Torre'),
          tipofnd:   hdr.indexOf('Tipo_Fnd'),
          pata:      hdr.indexOf('Pata'),
        };

        rows.slice(hdrIdx+1).forEach((row, ri) => {
          const tid = String(row[iD.torre]).trim();
          if (!tid || tid===''||tid==='undefined') return;

          // Check tower exists in our list
          const torreObj = TORRES_MAP[tid];
          if (!torreObj) return;

          if (!imported[tid]) imported[tid] = {};

          const pata = parseInt(row[iD.pata]);
          const tipoFnd = String(row[iD.tipofnd]||'').trim().toLowerCase();

          // Set tipo fundacion if provided (only on pata=0 row)
          if ((pata===0||isNaN(pata)) && tipoFnd && ['ancla','hormigon','tradicional','na'].includes(tipoFnd)) {
            imported[tid]._fnd = tipoFnd;
          }

          // Process each column
          hdr.forEach((colName, ci) => {
            const info = colMap[colName];
            if (!info) return;
            const rawVal = row[ci];
            if (rawVal === '' || rawVal === null || rawVal === undefined) return;
            const numVal = parseFloat(rawVal);
            if (isNaN(numVal)) return;
            const val = Math.min(1, Math.max(0, numVal/100));

            if (info.type === 'gen' && (pata===0||isNaN(pata))) {
              imported[tid][info.key] = val;
            } else if (info.type === 'mnt' && (pata===0||isNaN(pata))) {
              imported[tid][info.key] = val;
            } else if (info.type === 'fnd' && pata>=1 && pata<=4) {
              imported[tid][info.key+'_p'+pata] = val;
            }
          });
        });
      } else {
        // Legacy "Datos Raw" format
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
        rows.slice(1).forEach(r => {
          if (!r[0] && r[0]!==0) return;
          const id=String(r[0]).trim(), campo=String(r[1]).trim(), valor=r[2];
          if (!id||!campo) return;
          if (!imported[id]) imported[id]={};
          imported[id][campo] = typeof valor==='number' ? valor : String(valor);
        });
      }

      const count = Object.keys(imported).length;
      if (count === 0) { showToast('⚠️ No se encontraron datos válidos'); return; }

      window._importPending = imported;

      // Preview summary
      const configured = Object.values(imported).filter(av=>av._fnd).length;
      const html =
        '<div style="font-size:13px;color:#94a3b8;margin-bottom:12px">'
        + 'Se encontraron datos para <b style="color:#f59e0b">'+count+' torres</b>'
        + (configured>0?' ('+configured+' con tipo de fundación)':'')+'.<br><br>'
        + 'Esto sobreescribirá los datos actuales de esas torres.</div>'
        + '<button class="action-btn btn-primary" onclick="confirmarImport()">✅ Confirmar Importación</button>'
        + '<button class="action-btn btn-secondary" onclick="closeModal()">Cancelar</button>';
      openModal('⬆️ Confirmar Importación', html);
    } catch(err) {
      console.error('Import error:', err);
      showToast('⚠️ Error al leer Excel: '+err.message);
    }
  };
  reader.readAsBinaryString(file);
}

function confirmarImport() {
  const data = window._importPending;
  if (!data || Object.keys(data).length === 0) {
    showToast('⚠️ Error: no hay datos pendientes'); return;
  }
  let count = 0;
  Object.keys(data).forEach(id => {
    const strId = String(id).trim();
    // Merge: don't overwrite existing data not in import
    if (!avances[strId]) avances[strId] = {};
    Object.assign(avances[strId], data[id]);
    avances[strId]._updated = new Date().toISOString();
    count++;
  });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(avances)); } catch {}
  if (dbReady && db) {
    const update = {};
    Object.keys(data).forEach(id => { update[String(id)] = avances[String(id)]; });
    db.ref('avances').update(update);
  }
  window._importPending = null;
  closeModal();
  showToast('✅ '+count+' torres importadas');
  renderCurrentView();
}

// ── FECHAS INICIO / TÉRMINO ──────────────────────────────────
// Claves:
//   inicio_ETAPAID_pN  (pata)  |  inicio_ETAPAID  (torre)
//   fin_ETAPAID_pN     (pata)  |  fin_ETAPAID      (torre)

function iniciKey(eid, p) { return (p ? 'inicio_'+eid+'_p'+p : 'inicio_'+eid); }
function finKey(eid, p)   { return (p ? 'fin_'+eid+'_p'+p   : 'fin_'+eid);    }

function formatFecha(iso) {
  if (!iso) return null;
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function todayISO() { return new Date().toISOString().slice(0,10); }

// Calcula días entre dos fechas ISO
function diasEntre(iso1, iso2) {
  if (!iso1 || !iso2) return null;
  const d = Math.round((new Date(iso2)-new Date(iso1))/(1000*60*60*24));
  return d >= 0 ? d : null;
}

// Abre modal para editar inicio y/o término de una partida
function abrirFechasModal(eid, p, label) {
  if (!avances[currentTorreId]) avances[currentTorreId] = {};
  const av  = avances[currentTorreId];
  const kI  = iniciKey(eid, p||null);
  const kF  = finKey(eid, p||null);
  const vI  = av[kI] || '';
  const vF  = av[kF] || '';
  const dias = diasEntre(vI, vF);
  const scopeLabel = p ? `${label} – Pata ${p}` : label;

  const html = `
    <div style="font-size:13px;font-weight:700;color:#f8fafc;margin-bottom:14px">${scopeLabel}</div>
    <div class="form-group">
      <label class="form-label" style="color:#60a5fa">📅 Fecha de Inicio</label>
      <input type="date" id="fi-input" value="${vI}" max="${todayISO()}"/>
    </div>
    <div class="form-group" style="margin-top:8px">
      <label class="form-label" style="color:#10b981">🏁 Fecha de Término</label>
      <input type="date" id="ff-input" value="${vF}" max="${todayISO()}"/>
    </div>
    ${dias!==null?`<div style="font-size:12px;color:#f59e0b;margin:8px 0;text-align:center">⏱️ Duración: <b>${dias} día${dias===1?'':'s'}</b></div>`:''}
    <button class="action-btn btn-primary" onclick="guardarFechas('${eid}',${p||0},'${kI}','${kF}')">💾 Guardar fechas</button>
    <button class="action-btn btn-secondary" onclick="borrarFechas('${kI}','${kF}')">🗑️ Quitar ambas fechas</button>
    <button class="action-btn btn-secondary" onclick="closeModal()">Cancelar</button>`;

  openModal('📅 Fechas de la Actividad', html);
}

function guardarFechas(eid, p, kI, kF) {
  const fi = document.getElementById('fi-input');
  const ff = document.getElementById('ff-input');
  if (!avances[currentTorreId]) avances[currentTorreId] = {};
  if (fi && fi.value) avances[currentTorreId][kI] = fi.value;
  else delete avances[currentTorreId][kI];
  if (ff && ff.value) avances[currentTorreId][kF] = ff.value;
  else delete avances[currentTorreId][kF];
  saveAvance(currentTorreId);
  closeModal();
  renderCurrentView();
}

function borrarFechas(kI, kF) {
  if (!avances[currentTorreId]) return;
  delete avances[currentTorreId][kI];
  delete avances[currentTorreId][kF];
  saveAvance(currentTorreId);
  closeModal();
  renderCurrentView();
}

  const fechas = Object.keys(av)

    .map(k => av[k])
    .sort().reverse();
  return fechas.length ? formatFecha(fechas[0]) : null;
}

  const fechas = Object.keys(av)
    .filter(k => k.startsWith('inicio_') && av[k])
    .map(k => av[k])
    .sort();
  return fechas.length ? formatFecha(fechas[0]) : null;
}

      <button class="proto-btn${est===s.id?' active-'+s.id:''}" data-pk="${key}" data-estado="${s.id}"

    </div>
  </div>`;
}
function protoPataHtml(eid, p, av) {
  const key=protoPataKey(eid,p), est=av[key]||'pendiente';
  return `<div class="proto-row" style="margin-top:5px">
    <div class="proto-label" style="font-size:9px">📋 PROTO P${p} <span style="color:${PROTO_COLORS[est]}">${est.toUpperCase()}</span></div>
    <div class="proto-states">${PROTO_STATES.map(s=>`
      <button class="proto-btn${est===s.id?' active-'+s.id:''}" data-pk="${key}" data-estado="${s.id}"
        onclick="setProtoPata('${eid}',${p},'${s.id}')">${s.label}</button>`).join('')}
    </div>
  </div>`;
}

function renderPartida(e, av, fndColor) {
  const eid=e.id, isOpen=openPartida===eid;
  const avg=allPatasNA(av,eid)?1:avgPatas(av,eid);
  const patasHtml = PATAS.map(p => {
    const key=pataKey(eid,p), val=av[key], isNA=val==='na', num=isNA?1:(val||0);
    // barra con ID para actualización dinámica sin re-render
    const barId = `patabar_${eid}_p${p}`;
    return `<div class="pata-row">
      <div class="pata-label" style="margin-bottom:6px">
        <span class="pata-name" style="color:${isNA?'#334155':'#64748b'}">PATA ${p}</span>
        <div style="display:flex;align-items:center;gap:5px">
          ${isNA
            ?`<span style="font-size:9px;font-weight:700;color:#475569;background:#1e293b;border-radius:4px;padding:2px 5px">N/A</span>`
            :`<span id="pct_${eid}_p${p}" style="font-size:11px;font-weight:700;color:${fndColor};font-family:monospace">${pct(num)}%</span>`}
          <button style="border:1px solid ${isNA?'#f59e0b':'#334155'};background:${isNA?'#431407':'transparent'};color:${isNA?'#f59e0b':'#475569'};padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700"
            onclick="toggleNAPata('${eid}',${p})">N/A</button>
        </div>
      </div>
      ${!isNA?`
        <div class="bar-wrap" style="height:5px;margin-bottom:4px">
          <div id="${barId}" class="bar-fill" style="width:${pct(num)}%;background:${fndColor};height:100%"></div>
        </div>
        ${pctBtns(num,'pata',eid,p,fndColor)}
      `:'<div style="height:5px;background:#334155;border-radius:3px;margin-bottom:4px;opacity:.3"></div>'}
      ${e.proto==='pata'?protoPataHtml(eid,p,av):''}
      ${!isNA ? fechasHtml(av,eid,p,e.label) : ''}
    </div>`;
  }).join('');
  return `<div class="partida-block">
    <div class="partida-header" onclick="togglePartida('${eid}')">
      <div>
        <div class="partida-title">${e.label}</div>
        <div style="font-size:9px;color:#475569;margin-top:1px">×${e.peso} · promedio 4 patas</div>
      </div>
      <div style="display:flex;align-items:center;gap:7px">
        <span id="badge_${eid}">${badge(avg)}</span>
        <span class="partida-chevron ${isOpen?'open':''}">▾</span>
      </div>
    </div>
    ${isOpen?`<div class="partida-body open">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #1e293b">
          <span style="font-size:9px;color:#475569;flex-shrink:0">Aplicar a las 4 patas:</span>
          <div style="display:flex;gap:3px;flex:1">
            ${[0,25,50,75,100].map(v=>`<button onclick="aplicarTodasPatas('${eid}',${v})"
              style="flex:1;padding:4px 0;border-radius:5px;border:1px solid ${fndColor}44;background:transparent;color:${fndColor};font-size:9px;font-weight:700;cursor:pointer">${v}%</button>`).join('')}
          </div>
        </div>
        ${patasHtml}
        <div style="display:flex;align-items:center;gap:7px;padding:8px 0 3px;border-top:1px solid #1e293b;margin-top:3px">
          <span style="font-size:10px;color:#475569">Promedio:</span>
          <div style="flex:1"><div class="bar-wrap" style="height:5px"><div id="prombar_${eid}" class="bar-fill" style="width:${Math.min(100,pct(avg))}%;background:${fndColor};height:100%"></div></div></div>
          <span id="prompct_${eid}" style="font-size:10px;color:${fndColor};font-weight:700">${pct(avg)}%</span>
        </div>
        ${e.proto==='torre'?protoTorreHtml(protoKey(eid),av):''}
        ${e.proto==='torre'?fechasHtml(av,eid,null,e.label):''}
      </div>`
    :`<div class="partida-body"><div style="padding:0 0 6px"><div class="bar-wrap" style="height:4px"><div id="bar_${eid}" class="bar-fill" style="width:${Math.min(100,pct(avg))}%;background:${getColor(avg)};height:100%"></div></div></div></div>`}
  </div>`;
}

function actGenHtml(e, av) {
  const key=e.id, val=av[key], isNA=val==='na', num=isNA?1:(val||0), done=!isNA&&num>=1;
  return `<div class="act-row">
    <div class="act-top">
      <div class="act-check" style="background:${done?'#f59e0b':'transparent'};border-color:${isNA?'#334155':done?'#f59e0b':'#334155'}"
        onclick="toggleCheck_gen('${key}')">
        ${done?'<span style="color:#0f172a;font-size:11px;font-weight:900">✓</span>':''}
      </div>
      <span class="act-label ${isNA?'na':done?'done':''}">${e.label}</span>
      ${isNA?'<span style="font-size:9px;font-weight:700;color:#475569;background:#1e293b;border-radius:4px;padding:2px 5px">N/A</span>':badge(num)}
      <button class="act-na-btn" style="border:1px solid ${isNA?'#f59e0b':'#334155'};background:${isNA?'#431407':'transparent'};color:${isNA?'#f59e0b':'#475569'}"
        onclick="toggleNA_gen('${key}')">N/A</button>
    </div>
    ${protoTorreHtml(protoKey(key),av)}
    ${!isNA ? fechasHtml(av,key,null,e.label) : ''}
  </div>`;
}

function actMntHtml(e, av) {
  const key=e.id, val=av[key], isNA=val==='na', num=isNA?1:(val||0);
  const col='#10b981';
  return `<div class="act-row">
    <div class="act-top" style="margin-bottom:${isNA?'0':'6px'}">
      <span class="act-label" style="flex:1;font-size:12px;color:${isNA?'#334155':num>=1?'#10b981':num>0?'#d97706':'#94a3b8'};${isNA?'text-decoration:line-through':''}">${e.label} <span style="font-size:9px;color:#475569">×${e.peso}</span></span>
      ${isNA?'<span style="font-size:9px;font-weight:700;color:#475569;background:#1e293b;border-radius:4px;padding:2px 5px">N/A</span>':badge(num)}
      <button class="act-na-btn" style="border:1px solid ${isNA?'#f59e0b':'#334155'};background:${isNA?'#431407':'transparent'};color:${isNA?'#f59e0b':'#475569'}"
        onclick="toggleNA_mnt('${key}')">N/A</button>
    </div>
    ${!isNA?`
      <div class="bar-wrap" style="height:5px;margin-bottom:4px">
        <div id="bar_mnt_${key}" class="bar-fill" style="width:${pct(num)}%;background:${col};height:100%"></div>
      </div>
      ${pctBtns(num,'mnt',key,0,col)}
    `:''}
    ${protoTorreHtml(protoKey(key),av)}
  </div>`;
}

function resetTorre(id) {
  const html = '<div style="font-size:13px;color:#94a3b8;margin-bottom:16px">'
    + 'Esto borrará <b style="color:#f43f5e">todos los datos</b> de la Torre <b style="color:#f59e0b">'+id+'</b>:<br>'
    + 'avance, protocolos, impedimentos y tipo de fundación.<br><br>'
    + '<b style="color:#f59e0b">Esta acción no se puede deshacer.</b></div>'
    + '<button class="action-btn btn-danger" onclick="confirmarResetTorre('+id+')">🗑️ Sí, resetear Torre '+id+'</button>'
    + '<button class="action-btn btn-secondary" onclick="closeModal()">Cancelar</button>';
  openModal('🗑️ Resetear Torre '+id, html);
}
function confirmarResetTorre(id) {
  avances[id] = {};
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(avances)); } catch {}
  if (dbReady && db) db.ref('avances/'+id).remove();
  closeModal();
  showToast('🗑️ Torre '+id+' reseteada');
  goBack();
}

// ── ARRANQUE ──────────────────────────────────────────────────
function setupResponsiveLayout() {
  const isDesktop = window.innerWidth >= 768;
  const topbar    = document.querySelector('.desktop-topbar');
  const mobileHdr = document.getElementById('mobile-header');
  const sidebar   = document.getElementById('sidebar');
  const layout    = document.getElementById('app-layout');
  const syncDot   = document.getElementById('sync-dot');

  if (isDesktop) {
    // Activar layout desktop
    if (topbar)    topbar.style.display    = 'flex';
    if (mobileHdr) mobileHdr.style.display = 'none';
    if (sidebar)   sidebar.style.display   = 'block';
    if (layout)    layout.style.display    = 'flex';
    if (syncDot)   syncDot.style.display   = 'none'; // reemplazado por desktop indicator
    document.body.style.maxWidth = '100%';
    // Ajustar content padding para desktop
    const content = document.getElementById('content');
    if (content) content.style.padding = '0';
    // Ajustar main-content
    const mainContent = document.getElementById('main-content');
    if (mainContent) mainContent.style.flex = '1';
    // Ajustar modal para desktop
    const modalBox = document.getElementById('modal-box');
    if (modalBox) { modalBox.style.borderRadius='16px'; }
    // Filtros en desktop: dentro del sidebar o en header
    const filters = document.getElementById('lista-filters');
    if (filters) { filters.style.padding = '8px 28px'; filters.style.background='#0f172a'; }
  } else {
    // Layout móvil (defaults)
    if (topbar)    topbar.style.display    = 'none';
    if (mobileHdr) mobileHdr.style.display = 'block';
    if (sidebar)   sidebar.style.display   = 'none';
    if (layout)    layout.style.display    = 'block';
    if (syncDot)   syncDot.style.display   = 'block';
  }
}

window.addEventListener('load', () => {
  loadPesos();
  buildTorresMap();
  setupResponsiveLayout();

  // IMPORTANTE: cargar primero la base embebida del Excel 08-06.
  // Así la app muestra avance de inmediato, aunque Firebase esté vacío, lento o bloqueado en la vista previa.
  loadFromLS();
  suppressHistory = true;
  goView('dashboard');
  suppressHistory = false;
  replaceNavState();

  // Luego se conecta Firebase para sincronizar futuras ediciones/fotos sin dejar el dashboard en 0%.
  initFirebase();
  loadHitoFechas();
  loadSectorTitles();
  initStorage();
});

// Re-aplicar layout si cambia el tamaño de ventana (ej: rotar tablet)
window.addEventListener('resize', () => {
  setupResponsiveLayout();
});
</script>
